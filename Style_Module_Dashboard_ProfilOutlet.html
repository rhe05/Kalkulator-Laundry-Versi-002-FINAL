<!--
===============================================================================
FILE: Style_Module_Dashboard_ProfilOutlet.html  (BAGIAN 3 dari 9)
Bagian dari Style_Module_Dashboard (peta lengkap di file utama). Include
SETELAH file utama.
ISI: Kartu Profil Outlet premium (profil-outlet-card, KPI cuci/kering/setrika,
divider, mesin, okupansi + tooltip).
===============================================================================
-->
<style>
  /* === PROFIL OUTLET CARD PREMIUM === */
  .profil-outlet-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .profil-outlet-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .profil-outlet-kategori {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--brass);
    background: rgba(var(--brass-rgb, 180, 130, 60), 0.08);
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.2);
  }

  .profil-outlet-jam {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }

  .profil-outlet-kpi {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0;
    background: var(--panel-2);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .profil-outlet-kpi.profil-outlet-kpi-solo {
    grid-template-columns: 1fr;
    margin-top: 8px;
  }

  .profil-outlet-kpi.kpi-3col {
    grid-template-columns: 1fr auto 1fr auto 1fr;
    padding: 12px 10px;
  }


  .profil-outlet-kpi.kpi-3col .profil-kpi-divider {
    margin: 0 8px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-label {
    font-size: 9px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-value {
    font-size: 16px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-unit {
    font-size: 9px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-okupansi {
    font-size: 9px;
    flex-wrap: wrap;
  }

  .profil-kpi-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 2px;
  }

  .profil-kpi-label {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }

  .profil-kpi-value {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .profil-kpi-item.cuci .profil-kpi-value {
    color: var(--sage);
  }

  .profil-kpi-item.kering .profil-kpi-value {
    color: var(--brass);
  }

  .profil-kpi-item.setrika .profil-kpi-value {
    color: var(--volt);
  }

  .profil-kpi-unit {
    font-size: 10.5px;
    color: var(--text-faint);
    font-weight: 500;
  }

  .profil-kpi-value-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .profil-kpi-okupansi {
    position: relative;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    color: var(--text-faint);
    margin-top: 2px;
  }

  .okupansi-info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text-faint);
    font-size: 9px;
    font-weight: 700;
    line-height: 1;
    padding: 0;
    cursor: pointer;
  }

  .okupansi-tooltip {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 6px;
    width: 180px;
    max-width: 55vw;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 11px;
    line-height: 1.4;
    color: var(--text-dim);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 20;
  }

  .profil-kpi-item:last-child .okupansi-tooltip {
    left: auto;
    right: 0;
  }

  .profil-outlet-okupansi-info {
    display: inline-flex;
    vertical-align: middle;
    margin-left: 4px;
  }

  .profil-outlet-okupansi-info .okupansi-tooltip {
    left: auto;
    right: 0;
    width: 200px;
    max-width: 70vw;
  }

  .okupansi-tooltip.is-open {
    display: block;
  }


  @media (hover: hover) and (pointer: fine) {
    .profil-kpi-okupansi:hover .okupansi-tooltip {
      display: block;
    }
  }

  .profil-kpi-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    margin: 0 16px;
  }

  .profil-outlet-mesin {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .profil-outlet-mesin.profil-outlet-mesin-solo {
    justify-content: center;
  }

  .profil-outlet-mesin.profil-outlet-mesin-solo .profil-mesin-item {
    flex: 0 1 220px;
  }

  .profil-mesin-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel-2);
    flex: 1;
  }

  .profil-mesin-item.sage {
    border-color: rgba(var(--sage-rgb, 80, 160, 140), 0.25);
    background: rgba(var(--sage-rgb, 80, 160, 140), 0.05);
  }

  .profil-mesin-item.brass {
    border-color: rgba(var(--brass-rgb, 180, 130, 60), 0.25);
    background: rgba(var(--brass-rgb, 180, 130, 60), 0.05);
  }

  .profil-mesin-count {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .profil-mesin-item.sage .profil-mesin-count {
    color: var(--sage);
  }

  .profil-mesin-item.brass .profil-mesin-count {
    color: var(--brass);
  }

  .profil-mesin-item.volt {
    border-color: rgba(217,194,75,0.25);
    background: rgba(217,194,75,0.05);
  }

  .profil-mesin-item.volt .profil-mesin-count {
    color: var(--volt);
  }

  .profil-mesin-type {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }

  .profil-mesin-kategori {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-faint);
    letter-spacing: 0.03em;
  }

  .profil-mesin-durasi {
    font-size: 9.5px;
    font-weight: 500;
    color: var(--text-faint);
    letter-spacing: 0.02em;
  }

  /* ====================================================================
     LAYAR PROFIL OUTLET (#screenList) - KHUSUS DESKTOP (>=1100px).
     Konsep: satu kartu besar berisi profil 1 outlet terpilih (pola sama
     dgn Dashboard), header kanan-atas = nama outlet + badge kategori,
     brand "Kalkulator Laundry" + tombol Back dibuang, cukup 1 layar.
     HP/tablet (<1100px) TIDAK PERNAH masuk media query ini -> tetap pakai
     daftar outlet lama (.profil-outlet-mobile-only), tidak berubah.
     ==================================================================== */
  .profil-outlet-desktop { display: none; }

  @media (min-width: 1100px) {
    /* Daftar HP disembunyikan, kartu tunggal desktop dipakai. */
    #screenList .profil-outlet-mobile-only { display: none; }
    #screenList .profil-outlet-desktop { display: flex; flex-direction: column; gap: 14px; }

    /* Brand + tombol Back dibuang di layar ini (branding sudah ada di
       sidebar). DIBATASI ke #screenList.active -> layar lain tetap punya
       header. HP tak pernah masuk sini. */
    body:has(#screenList.active) .app-header { display: none !important; }
    body:has(#screenList.active) { padding-top: 4px; }
    body:has(#screenList.active) .wrap { width: min(100%, 1100px); }

    /* Topbar tipis (pola sama dgn Dashboard desktop). */
    #screenList .dashboard-header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      margin-bottom: 0;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03);
    }
    #screenList .dashboard-header-top { align-items: center; }
    #screenList .dashboard-title { font-size: 16px; margin-bottom: 0; letter-spacing: -0.01em; }

    /* Pill nama outlet + badge kategori (aktifkan badge & buka lebar pill,
       sama spt Dashboard yg discope ke #screenMenu.active). */
    body:has(#screenList.active) .outlet-filter-pill { max-width: none; }
    body:has(#screenList.active) .outlet-kategori-badge {
      display: inline-flex; align-items: center; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; color: var(--brass);
      background: rgba(var(--brass-rgb, 180, 130, 60), 0.10);
      border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.22);
      border-radius: 999px; padding: 2px 8px; margin: 0 2px; white-space: nowrap; flex-shrink: 0;
    }

    /* Satu kartu besar penampung profil outlet. */
    #screenList .profil-outlet-desktop-panel { padding: 22px 24px; }
    #screenList .profil-outlet-card { gap: 16px; }

    /* Grid rincian: cuci/pengering/setrika berdampingan (auto-fit -> 1 kolom
       kalau cuma setrika, 2 kolom cuci+kering, 3 kolom kalau ada setrika).
       Muat 1 layar tanpa scroll di lebar >=1100px. */
    #screenList .profil-outlet-detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 14px;
    }
    #screenList .profil-detail-panel {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }
    #screenList .profil-detail-head {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #screenList .profil-detail-head.sage { color: var(--sage); }
    #screenList .profil-detail-head.brass { color: var(--brass); }
    #screenList .profil-detail-head.volt { color: var(--volt); }
    #screenList .profil-detail-topstats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    #screenList .profil-detail-stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      min-width: 0;
    }
    #screenList .profil-detail-stat .k {
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 600;
    }
    #screenList .profil-detail-stat .v {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    #screenList .profil-detail-stat .v small { font-size: 10px; font-weight: 500; color: var(--text-faint); }
    #screenList .profil-detail-scale { display: flex; flex-direction: column; }
    #screenList .profil-detail-scale .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
    }
    #screenList .profil-detail-scale .row:last-child { border-bottom: none; }
    #screenList .profil-detail-scale .row .k { color: var(--text-dim); }
    #screenList .profil-detail-scale .row .v { font-weight: 700; font-variant-numeric: tabular-nums; }
    #screenList .profil-detail-scale .row.hi .v { color: var(--brass); }
    #screenList .profil-detail-okupansi {
      font-size: 11px;
      color: var(--text-faint);
      border-top: 1px dashed var(--border);
      padding-top: 8px;
    }

    /* Baris tombol Edit/Hapus di dalam kartu (menggantikan footer bar). */
    #screenList .profil-outlet-desktop-actions {
      display: flex; gap: 10px; justify-content: flex-end; align-items: center;
      margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border);
    }
    #screenList .profil-outlet-desktop-actions .btn-primary { flex: 0 0 auto; min-width: 150px; }
  }

</style>
