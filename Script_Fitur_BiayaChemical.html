<!--
===============================================================================
FILE: Script_Fitur_BiayaChemical.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Fitur Master Biaya > Chemical

FUNGSI:
CRUD & preview biaya chemical per cabang (multi-record: deterjen/softener/parfum/pelicin), kalkulasi biaya per Kg client-side.

PENTING -- catat sebelum edit:
Semua file Script_*.html berbagi SATU scope global yang sama (Apps Script
include() cuma menggabungkan teks mentah jadi satu <script> demi <script>
di halaman yang sama -- bukan module system). Karena itu file ini SENGAJA
TIDAK dibungkus (function(){...})() -- kalau kamu bungkus lagi, fungsi di
file ini jadi tidak kelihatan dari file lain dan app akan rusak.
Urutan include TIDAK masalah untuk deklarasi function/var (hoisting),
TAPI Script_Boot_Main.html WAJIB tetap paling terakhir karena dia yang
menjalankan bootApp().
===============================================================================

<script>
"use strict";
  function openChemicalList(cabangId) {
    view.chemicalCabangId = cabangId;
    showScreen("chemicalList");
    document.getElementById("chemicalListTitle").textContent = "Analisa Biaya Chemical";
    document.getElementById("chemicalListCount").textContent = "memuat...";
    document.getElementById("chemicalList").innerHTML = "";
    document.getElementById("chemicalListEmpty").style.display = "none";

    // SWR: daftar chemical outlet ini tampil INSTAN dari cache lalu refresh.
    cachedServerRead_("listBiayaChemical", cabangId, function (res, fromCache) {
      if (view.chemicalCabangId !== cabangId || view.screen !== "chemicalList") return;
      if (!res || !res.ok) {
        if (!fromCache) {
          handleBackendError(res, "memuat data biaya chemical");
          showScreen("masterBiaya");
          refreshBiayaPickCabangList();
        }
        return;
      }
      chemicalCabangCache = res.data.cabang;
      chemicalItemsCache = res.data.items;
      chemicalTotalCache = res.data.totalBiayaPerKg;
      document.getElementById("chemicalListTitle").textContent = "Analisa Biaya Chemical · " + (chemicalCabangCache.namaLaundry || "(Tanpa nama)");
      renderChemicalList();
    }, function (err, hadCache) {
      if (hadCache) return;
      handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:listBiayaChemical" }, "memuat data biaya chemical");
      showScreen("masterBiaya");
      refreshBiayaPickCabangList();
    });
  }
  window.openChemicalList = openChemicalList;

  /**
   * CHEMICAL_FIXED_NAMA: 4 item yang paling umum dipakai laundry, selalu
   * ditampilkan sebagai card duluan (kosong kalau belum diisi). Ini HANYA
   * urutan tampilan di frontend ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â data tetap tersimpan sebagai record
   * chemical biasa (field "nama" bebas teks, tanpa kategori/jenis di
   * backend), supaya tetap fleksibel untuk item tambahan apa pun (anti
   * noda, pemutih, dll) dan untuk integrasi lain ke depan.
   */
  var CHEMICAL_FIXED_NAMA = ["Deterjen", "Softener", "Parfum", "Pelicin"];

  function findChemicalEntryByNama(nama) {
    return chemicalItemsCache.find(function (entry) {
      return entry.record && entry.record.nama &&
        entry.record.nama.trim().toLowerCase() === nama.toLowerCase();
    }) || null;
  }

  function buildChemicalCard(displayNama, entry) {
    var card = document.createElement("div");
    card.className = "gas-card";

    if (!entry) {
      card.innerHTML =
        "<div class=\"gas-card-top\">" +
          "<div class=\"title-group\">" +
            "<span class=\"flame-dot\"></span>" +
            "<h3>" + escapeHtml(displayNama) + "</h3>" +
          "</div>" +
        "</div>" +
        "<div class=\"field-hint\">Belum ada data. Isi harga beli & takaran untuk mulai menghitung.</div>" +
        "<button class=\"add-cabang-btn flame\" type=\"button\" data-action=\"fill\" style=\"margin-top:10px;\">+ Isi data " + escapeHtml(displayNama) + "</button>";

      card.querySelector("[data-action='fill']").addEventListener("click", function () { window.openChemicalFormNew(displayNama); });
      return card;
    }

    var record = entry.record;
    var summary = entry.summary;

    var warningHtml = summary.statusValid ? "" :
      "<div class=\"gas-warning\">Isi kemasan atau takaran belum lengkap, biaya belum bisa dihitung.</div>";

    card.innerHTML =
      "<div class=\"gas-card-top\">" +
        "<div class=\"title-group\">" +
          "<span class=\"flame-dot\"></span>" +
          "<h3>" + escapeHtml(displayNama) + "</h3>" +
        "</div>" +
        "<div class=\"actions\">" +
          "<button class=\"icon-btn\" type=\"button\" aria-label=\"Edit\" data-action=\"edit\">&#9998;</button>" +
          "<button class=\"icon-btn\" type=\"button\" aria-label=\"Hapus\" data-action=\"delete\">&#10005;</button>" +
        "</div>" +
      "</div>" +
      "<div class=\"meta-row\"><span class=\"meta-label\">Harga beli</span><span class=\"meta-val\">" + money0(record.hargaBeli) + " / " + formatNum(record.isiKemasan) + " " + escapeHtml(record.satuanKemasan) + "</span></div>" +
      "<div class=\"meta-row\"><span class=\"meta-label\">Takaran per Kg</span><span class=\"meta-val\">" + formatNum(record.takaranPerKg) + " " + escapeHtml(record.satuanKemasan) + "</span></div>" +
      "<div class=\"gas-card-result\">" +
        "<div class=\"gas-result-grid\">" +
          "<div class=\"gas-result-cell\"><div class=\"label\">Harga / satuan</div><div class=\"val\">" + money0(summary.hargaPerUnit) + "</div></div>" +
          "<div class=\"gas-result-cell highlight\"><div class=\"label\">Biaya / Kg</div><div class=\"val\">" + money0(summary.biayaPerKg) + "</div></div>" +
        "</div>" +
        warningHtml +
      "</div>";

    card.querySelector("[data-action='edit']").addEventListener("click", function () { openChemicalFormEdit(record.id); });
    card.querySelector("[data-action='delete']").addEventListener("click", function () { openConfirmDeleteChemical(record); });

    return card;
  }

  function renderChemicalList() {
    var listEl = document.getElementById("chemicalList");
    var emptyEl = document.getElementById("chemicalListEmpty");
    var countEl = document.getElementById("chemicalListCount");
    var totalEl = document.getElementById("chemicalTotalPerKg");

    countEl.textContent = chemicalItemsCache.length + " data";
    totalEl.textContent = money0(chemicalTotalCache || 0);
    listEl.innerHTML = "";
    emptyEl.style.display = "none";

    var usedIds = {};

    CHEMICAL_FIXED_NAMA.forEach(function (fixedNama) {
      var entry = findChemicalEntryByNama(fixedNama);
      if (entry) usedIds[entry.record.id] = true;
      listEl.appendChild(buildChemicalCard(fixedNama, entry));
    });

    chemicalItemsCache.forEach(function (entry) {
      if (usedIds[entry.record.id]) return;
      listEl.appendChild(buildChemicalCard(entry.record.nama || "(Tanpa nama)", entry));
    });
  }

  function openConfirmDeleteChemical(record) {
    document.getElementById("confirmTitle").textContent = "Hapus item chemical ini?";
    document.getElementById("confirmText").textContent =
      "Data chemical \"" + (record.nama || "ini") + "\" akan dihapus permanen dan tidak bisa dikembalikan.";
    document.getElementById("confirmOverlay").classList.add("show");

    var btn = document.getElementById("confirmDeleteBtn");
    btn.onclick = function () { confirmDeleteChemical(record.id); };
  }

  function confirmDeleteChemical(id) {
    var btn = document.getElementById("confirmDeleteBtn");
    btn.disabled = true;
    btn.textContent = "Menghapus...";

    callServer_("deleteBiayaChemical", [id], function (res) {
        btn.disabled = false;
        btn.textContent = "Hapus";
        closeConfirm();
        if (!res || !res.ok) { handleBackendError(res, "menghapus data chemical"); return; }
        showToast("Data chemical berhasil dihapus.", "ok");
        invalidateServerReadCache_("listBiayaChemical", view.chemicalCabangId);
        invalidateServerReadCache_("getBiayaChemical");
        openChemicalList(view.chemicalCabangId);
      }, function (err) {
        btn.disabled = false;
        btn.textContent = "Hapus";
        handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:deleteBiayaChemical" }, "menghapus data chemical");
      });
  }

  function defaultChemicalRecord(cabangId) {
    return {
      id: null,
      cabangId: cabangId,
      nama: "",
      tipeDeterjen: "",
      hargaBeli: 0,
      isiKemasan: 0,
      satuanKemasan: "",
      takaranPerKg: 0,
      cuciRefId: "",
      createdAt: null,
      updatedAt: null
    };
  }

  var CHEMICAL_KONVERSI_DASAR = { liter: 1000, kg: 1000, gram: 1, ml: 1 };
  var CHEMICAL_SATUAN_DASAR_LABEL = { liter: "ml", ml: "ml", kg: "gram", gram: "gram" };

  function isChemicalFixedNama(nama) {
    var v = (nama || "").trim().toLowerCase();
    return CHEMICAL_FIXED_NAMA.some(function (n) { return n.toLowerCase() === v; });
  }

  function isChemicalDeterjenNama(nama) {
    return (nama || "").trim().toLowerCase() === "deterjen";
  }

  window.openChemicalFormNew = function (presetNama) {
    if (!chemicalCabangCache) { showToast("Pilih cabang terlebih dahulu.", "err"); return; }
    view.chemicalIsNew = true;
    view.chemicalEditingId = null;
    chemicalFormState = defaultChemicalRecord(view.chemicalCabangId);
    if (presetNama) chemicalFormState.nama = presetNama;
    view.chemicalIsFixedNama = isChemicalFixedNama(presetNama);
    showScreen("chemicalForm");
    document.getElementById("chemicalFormTitle").textContent = view.chemicalIsFixedNama
      ? "Isi Data " + presetNama
      : "Tambah Item Chemical";
    renderChemicalForm();
    setSaveStatus("", "");
  };

  function openChemicalFormEdit(id) {
    view.chemicalIsNew = false;
    view.chemicalEditingId = id;
    showScreen("chemicalForm");
    document.getElementById("chemicalFormTitle").textContent = "Edit Item Chemical";
    setSaveStatus("Memuat...", "busy");

    // SWR "render sekali": instan dari cache, hasil server belakangan tidak
    // menimpa form (chemicalRendered) supaya ketikan aman.
    var chemicalRendered = false;
    cachedServerRead_("getBiayaChemical", id, function (res, fromCache) {
      if (view.chemicalEditingId !== id || view.screen !== "chemicalForm") return;
      if (!res || !res.ok) {
        if (!fromCache) {
          handleBackendError(res, "memuat data chemical untuk diedit");
          openChemicalList(view.chemicalCabangId);
        }
        return;
      }
      if (!fromCache && chemicalRendered) return;
      chemicalFormState = res.data.record;
      view.chemicalIsFixedNama = isChemicalFixedNama(chemicalFormState.nama);
      if (view.chemicalIsFixedNama) {
        document.getElementById("chemicalFormTitle").textContent = "Edit Data " + chemicalFormState.nama;
      }
      renderChemicalForm();
      setSaveStatus("", "");
      chemicalRendered = true;
    }, function (err, hadCache) {
      if (hadCache) return;
      handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:getBiayaChemical" }, "memuat data chemical untuk diedit");
      openChemicalList(view.chemicalCabangId);
    });
  }

  function syncChemicalFormFieldsFromState() {
    document.getElementById("chemicalNama").value = chemicalFormState.nama || "";
    document.getElementById("chemicalTipeDeterjen").value = chemicalFormState.tipeDeterjen || "";
    document.getElementById("chemicalHargaBeli").value = chemicalFormState.hargaBeli ? Number(chemicalFormState.hargaBeli).toLocaleString("id-ID") : "";
    document.getElementById("chemicalIsiKemasan").value = chemicalFormState.isiKemasan || "";
    document.getElementById("chemicalSatuanKemasan").value = chemicalFormState.satuanKemasan || "";
    document.getElementById("chemicalTakaranPerKg").value = chemicalFormState.takaranPerKg || "";
  }

  function renderChemicalForm() {
    syncChemicalFormFieldsFromState();
    renderChemicalFormNamaMode();
    renderChemicalCuciOptions();
    renderChemicalSatuanUI();
    renderChemicalFormPreview();
  }

  function renderChemicalFormNamaMode() {
    var isFixed = !!view.chemicalIsFixedNama;
    var fixedWrap = document.getElementById("chemicalNamaFixedWrap");
    var fixedLabel = document.getElementById("chemicalNamaFixedLabel");
    var namaField = document.getElementById("chemicalNamaField");
    if (fixedWrap) fixedWrap.style.display = isFixed ? "" : "none";
    if (fixedLabel) fixedLabel.textContent = chemicalFormState.nama || "";
    if (namaField) namaField.style.display = isFixed ? "none" : "";

    var isDeterjen = isChemicalDeterjenNama(chemicalFormState.nama);
    var tipeField = document.getElementById("chemicalTipeDeterjenField");
    if (tipeField) tipeField.style.display = isDeterjen ? "" : "none";
  }

  function renderChemicalCuciOptions() {
    var select = document.getElementById("chemicalCuciRef");
    if (!select) return;
    var mesinCuci = (chemicalCabangCache && chemicalCabangCache.mesinCuci) || [];

    // [Kategori tanpa mesin cuci, mis. Jasa Setrika] Sembunyikan field acuan
    // total - biayaPerKg tidak butuh ini sama sekali (lihat computeBiayaChemicalSummaryClient).
    var wrapEl = document.getElementById("chemicalCuciRefWrap");
    if (wrapEl) wrapEl.style.display = mesinCuci.length ? "" : "none";
    if (!mesinCuci.length) return;

    select.innerHTML = "";
    var placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = "Pilih mesin cuci acuan (opsional)";
    select.appendChild(placeholder);
    mesinCuci.forEach(function (m, idx) {
      var opt = document.createElement("option");
      opt.value = m.id;
      opt.textContent = "Unit #" + (idx + 1) + " · " + formatNum(m.kapasitasKg || 0) + " Kg";
      if (m.id === chemicalFormState.cuciRefId) opt.selected = true;
      select.appendChild(opt);
    });
  }

  function renderChemicalSatuanUI() {
    var unitLabel = CHEMICAL_SATUAN_DASAR_LABEL[chemicalFormState.satuanKemasan] || "-";
    var badge = document.getElementById("chemicalTakaranUnitBadge");
    if (badge) badge.textContent = unitLabel;
  }

  function chemicalWeightedSetrikaKgPerJamClient_(mesinSetrika) {
    var rows = Array.isArray(mesinSetrika) ? mesinSetrika : [];
    var totalWeighted = 0, totalWeight = 0;
    rows.forEach(function (m) {
      var amount = Number(m.kapasitasKgPerJam) || 0;
      var unit = Math.max(1, Number(m.jumlahUnit) || 1);
      if (amount > 0) { totalWeighted += amount * unit; totalWeight += unit; }
    });
    return totalWeight > 0 ? round2(totalWeighted / totalWeight) : 0;
  }

  function computeBiayaChemicalSummaryClient(record) {
    var mesinCuci = (chemicalCabangCache && chemicalCabangCache.mesinCuci) || [];
    var faktorKonversi = CHEMICAL_KONVERSI_DASAR[record.satuanKemasan] || 0;
    var isiKemasanDasar = record.isiKemasan * faktorKonversi;
    var hargaPerUnit = isiKemasanDasar > 0 ? round2(record.hargaBeli / isiKemasanDasar) : 0;

    var cuci = mesinCuci.find(function (m) { return m.id === record.cuciRefId; }) || null;
    // [Outlet tanpa mesin cuci, mis. Jasa Setrika] pakai kapasitas kg/jam
    // mesin setrika sebagai acuan pengganti ("per jam" dianggap "per load"),
    // sama seperti backend computeBiayaChemicalSummary_ (Modul_BiayaChemical.gs).
    var kapasitasAcuan = cuci ? (Number(cuci.kapasitasKg) || 0) : 0;
    if (!mesinCuci.length) {
      kapasitasAcuan = chemicalWeightedSetrikaKgPerJamClient_(chemicalCabangCache && chemicalCabangCache.mesinSetrika);
    }

    // biayaPerKg dihitung LANGSUNG (takaranPerKg * hargaPerUnit) - tidak
    // butuh mesin cuci acuan (sama seperti backend computeBiayaChemicalSummary_
    // di Modul_BiayaChemical.gs). biayaPerLoad tetap butuh acuan kapasitas.
    var biayaPerKg = round2(record.takaranPerKg * hargaPerUnit);
    var pemakaianPerLoadDasar = round2(record.takaranPerKg * kapasitasAcuan);
    var biayaPerLoad = round2(pemakaianPerLoadDasar * hargaPerUnit);

    return {
      hargaPerUnit: hargaPerUnit,
      satuanDasar: CHEMICAL_SATUAN_DASAR_LABEL[record.satuanKemasan] || "",
      biayaPerLoad: biayaPerLoad,
      biayaPerKg: biayaPerKg,
      statusValid: isiKemasanDasar > 0 && record.takaranPerKg > 0
    };
  }

  function renderChemicalFormPreview() {
    var summary = computeBiayaChemicalSummaryClient(chemicalFormState);

    var konversiEl = document.getElementById("chemicalKonversiSatuan");
    if (konversiEl) {
      konversiEl.textContent = summary.satuanDasar ? (money0(summary.hargaPerUnit) + " / " + summary.satuanDasar) : "-";
    }

    document.getElementById("cfBiayaPerLoad").textContent = money0(summary.biayaPerLoad);
    document.getElementById("cfBiayaPerKg").textContent = money0(summary.biayaPerKg);

    var warnEl = document.getElementById("cfWarning");
    if (!summary.statusValid) {
      warnEl.style.display = "block";
      warnEl.textContent = "Lengkapi isi kemasan, satuan, dan takaran per Kg supaya biaya bisa dihitung.";
    } else {
      warnEl.style.display = "none";
    }
  }

  function bindChemicalFormInputs() {
    document.getElementById("chemicalNama").addEventListener("input", function (e) {
      chemicalFormState.nama = e.target.value;
      renderChemicalFormNamaMode();
      renderChemicalFormPreview();
    });
    document.getElementById("chemicalTipeDeterjen").addEventListener("change", function (e) {
      chemicalFormState.tipeDeterjen = e.target.value;
    });
    document.getElementById("chemicalHargaBeli").addEventListener("input", function (e) {
      var digitsOnly = e.target.value.replace(/[^0-9]/g, "");
      var numVal = Number(digitsOnly) || 0;
      chemicalFormState.hargaBeli = numVal;
      e.target.value = numVal > 0 ? numVal.toLocaleString("id-ID") : "";
      renderChemicalFormPreview();
    });
    document.getElementById("chemicalIsiKemasan").addEventListener("input", function (e) {
      chemicalFormState.isiKemasan = Number(e.target.value) || 0;
      renderChemicalFormPreview();
    });
    document.getElementById("chemicalSatuanKemasan").addEventListener("change", function (e) {
      chemicalFormState.satuanKemasan = e.target.value;
      renderChemicalSatuanUI();
      renderChemicalFormPreview();
    });
    document.getElementById("chemicalTakaranPerKg").addEventListener("input", function (e) {
      chemicalFormState.takaranPerKg = Number(e.target.value) || 0;
      renderChemicalFormPreview();
    });
    document.getElementById("chemicalCuciRef").addEventListener("change", function (e) {
      chemicalFormState.cuciRefId = e.target.value;
      renderChemicalFormPreview();
    });
  }

  function saveChemicalForm() {
    if (!chemicalFormState.nama || !chemicalFormState.nama.trim()) {
      showToast("Isi nama item chemical terlebih dahulu.", "err");
      document.getElementById("chemicalNama").classList.add("input-err");
      return;
    }
    document.getElementById("chemicalNama").classList.remove("input-err");

    var btn = document.getElementById("chemicalSaveBtn");
    if (btn) { btn.disabled = true; btn.textContent = "Menyimpan..."; }
    setSaveStatus("Menyimpan...", "busy");

    function onDone(res, actionLabel, restoreLabel) {
      if (btn) { btn.disabled = false; btn.textContent = restoreLabel; }
      if (!res || !res.ok) { handleBackendError(res, actionLabel); return; }
      showToast("Data biaya chemical tersimpan.", "ok");
      setSaveStatus("Tersimpan", "ok");
      invalidateServerReadCache_("listBiayaChemical", view.chemicalCabangId);
      invalidateServerReadCache_("getBiayaChemical");
      showScreen("masterBiaya");
      refreshBiayaPickCabangList();
    }

    if (view.chemicalIsNew) {
      callServer_("createBiayaChemical", [chemicalFormState], function (res) { onDone(res, "menyimpan data chemical baru", "Simpan item chemical"); }, function (err) {
          if (btn) { btn.disabled = false; btn.textContent = "Simpan item chemical"; }
          handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:createBiayaChemical" }, "menyimpan data chemical baru");
        });
    } else {
      callServer_("updateBiayaChemical", [view.chemicalEditingId, chemicalFormState], function (res) { onDone(res, "menyimpan perubahan data chemical", "Simpan perubahan"); }, function (err) {
          if (btn) { btn.disabled = false; btn.textContent = "Simpan perubahan"; }
          handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:updateBiayaChemical" }, "menyimpan perubahan data chemical");
        });
    }
  }

  /**
   * ===========================================================================
   * SECTION: MASTER BIAYA — PACKING (Plastik HD, Label, Dus, Isolasi, dll)
   * ===========================================================================
   * Sama seperti section Gas di atas, tapi TANPA acuan mesin (dryerRefId) —
   * basis hitungannya murni per Kg cucian, bukan per load. Item bebas
   * ditambah/dihapus (bukan daftar tetap), karena tiap laundry pakai
   * kombinasi packing yang berbeda-beda.
   * ===========================================================================
   */

</script>
