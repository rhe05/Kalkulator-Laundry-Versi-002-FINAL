<!--
===============================================================================
FILE: Style_Module_FixedCost.html
PROJECT: Kalkulator Laundry Versi 002
TAHAP: 3 — Pecah CSS Per Fitur

FUNGSI FILE:
Style khusus untuk fitur Biaya Tetap Outlet atau Fixed Cost.

ISI UTAMA:
1. Header Fixed Cost
2. Section Fixed Cost
3. Grid input biaya tetap
4. Dynamic row komponen biaya tetap
5. Summary Fixed Cost
6. Breakdown Fixed Cost
7. Ringkasan Fixed Cost di daftar outlet
8. Warning box Fixed Cost

BATAS TANGGUNG JAWAB:
- File ini hanya berisi CSS fitur Fixed Cost.
- Tidak boleh berisi CSS global.
- Tidak boleh berisi HTML screen.
- Tidak boleh berisi JavaScript.
- Jangan mengubah nama class, warna, atau layout tanpa instruksi khusus.

TERHUBUNG DENGAN:
- Index.html
- Screen_FixedCost.html pada tahap berikutnya
- Script_Module_FixedCost.html pada tahap berikutnya

CATATAN PENGEMBANGAN:
Jika tampilan Fixed Cost atau ringkasan Fixed Cost di daftar outlet bermasalah, mulai cek dari file ini.
===============================================================================
-->
<style>
/* ---------------------------------------------------------------------- */
/* BIAYA TETAP OUTLET (FIXED COST)                                        */
/* ---------------------------------------------------------------------- */
.fc-head { margin-bottom: 16px; }
.fc-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; }
.fc-desc { font-size: 12.5px; color: var(--text-faint); line-height: 1.5; }
.fc-section { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 14px; }
.fc-section-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.fc-section-note { font-size: 11.5px; color: var(--text-faint); line-height: 1.45; margin-top: -4px; margin-bottom: 12px; }
.fc-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fc-result-chip { background: rgba(111,160,140,0.08); border: 1px solid var(--sage-dim); border-radius: var(--radius); padding: 11px 12px; }
.fc-result-chip .label { font-size: 10.5px; color: var(--text-faint); margin-bottom: 5px; }
.fc-result-chip .value { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--sage); }
.fc-dynamic-list { display: flex; flex-direction: column; gap: 10px; }
.fc-dynamic-row { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.fc-row-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
.fc-row-title { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text); }
.fc-row-subtitle { font-size: 11px; color: var(--text-faint); margin-top: 3px; }
.fc-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fc-input-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.fc-input-grid .field { margin-bottom: 0; }
.fc-input-grid label { font-size: 10.5px; margin-bottom: 4px; }
.fc-mini-total { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; }
.fc-mini-total .k { color: var(--text-faint); }
.fc-mini-total .v { font-family: var(--font-mono); color: var(--brass); font-weight: 700; }
.fc-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fc-summary-item { background: var(--panel-2); border-radius: var(--radius); padding: 11px 12px; }
.fc-summary-item .label { font-size: 10.5px; color: var(--text-faint); margin-bottom: 5px; }
.fc-summary-item .value { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--text); }
.fc-summary-item.highlight { border: 1px solid var(--brass-dim); background: rgba(217,162,75,0.08); }
.fc-summary-item.highlight .value { color: var(--brass); }
.fc-component-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; gap: 10px; }
.fc-component-row:last-child { border-bottom: none; }
.fc-component-row .k { color: var(--text-dim); }
.fc-component-row .v { font-family: var(--font-mono); color: var(--text); font-weight: 700; text-align: right; }
.fc-component-row .pct { color: var(--brass); font-size: 11px; margin-left: 6px; }
.fc-warning-box { background: rgba(217,162,75,0.08); border: 1px solid var(--brass-dim); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 14px; }
.fc-warning-box .title { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--brass); margin-bottom: 8px; }
.fc-warning-box li { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-left: 18px; margin-bottom: 4px; }

/* Ringkasan fixed cost langsung di daftar outlet */
.fc-list-summary {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.fc-list-summary-top {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.fc-list-metric {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius);
  padding: 9px 10px;
}
.fc-list-metric .label { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; }
.fc-list-metric .value { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: var(--text); }
.fc-list-metric.highlight { border-color: var(--brass-dim); background: rgba(217,162,75,0.07); }
.fc-list-metric.highlight .value { color: var(--brass); }
.fc-list-breakdown { display: flex; flex-direction: column; gap: 4px; }
.fc-list-breakdown-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; font-size: 11.5px; }
.fc-list-breakdown-row .k { color: var(--text-faint); }
.fc-list-breakdown-row .v { font-family: var(--font-mono); color: var(--text-dim); font-weight: 700; white-space: nowrap; }
.fc-list-empty-note { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 11.5px; color: var(--text-faint); line-height: 1.45; }
@media (max-width: 520px) { .fc-list-summary-top { grid-template-columns: 1fr; } }
@media (max-width: 520px) { .fc-grid-2, .fc-input-grid, .fc-input-grid.three, .fc-summary-grid { grid-template-columns: 1fr; } }

/* === DESKTOP LAYOUT (>=1100px) - screenBiayaTetapList & screenBiayaTetapForm ===
   Sebelumnya layar ini TIDAK PUNYA penyesuaian desktop sama sekali (beda
   dgn Profil Outlet/Master Biaya/Struktur HPP/Harga Layanan yang sudah
   dilebarkan) - .wrap global tetap 480px shg tampil versi HP walau di
   layar PC/laptop lebar. Disamakan polanya di sini: .wrap dilebarkan
   khusus 2 screen ini (aman tanpa @media krn width:min(100%,1080px)
   otomatis balik ke 100% sendiri di HP), grid/masonry TETAP di dalam
   @media supaya HP tidak berubah sama sekali. */
body:has(#screenBiayaTetapList.active) .wrap,
body:has(#screenBiayaTetapForm.active) .wrap { width: min(100%, 1080px); }

@media (min-width: 1100px) {
  /* Daftar outlet jadi grid 2 kolom, bukan ditumpuk 1 kolom panjang -
     kartunya berisi ringkasan (fc-list-summary-top 2 kolom + breakdown)
     jadi 2 kolom lebih presisi drpd 3 kolom yang bikin kartu terlalu
     sempit. */
  #biayaTetapOutletList { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  #biayaTetapOutletList .menu-card { margin-bottom: 0; }

  /* Form: section-section (Sewa/Gaji/Internet/Depresiasi/Perawatan/Lain/
     Ringkasan) dipakai masonry 2 kolom spt Struktur HPP - summary-hero &
     warning box tetap selebar penuh di atasnya, tiap section tidak boleh
     terpotong di tengah kolom. */
  #biayaTetapContent { columns: 2; column-gap: 16px; }
  #biayaTetapContent .summary-hero,
  #biayaTetapContent .fc-warning-box { column-span: all; }
  #biayaTetapContent .fc-section { break-inside: avoid; }
}

/* ====================================================================
   LAYAR BIAYA TETAP OUTLET (#screenBiayaTetapList) - KHUSUS DESKTOP
   (>=1100px). Konsep sama dgn Dashboard/Profil Outlet/Master Biaya/
   Struktur HPP/Harga Layanan: satu panel utk outlet terpilih + tombol
   Edit ke form isi biaya (screenBiayaTetapForm, TIDAK diubah), brand
   "Kalkulator Laundry" + tombol Back dibuang, cukup 1 layar. Kartu REUSE
   ".fc-card" (collapsible, "Progressive Disclosure") - komponen yang
   SUDAH ADA & dipakai Dashboard, bukan bahasa visual baru (standar
   Hyper-Premium FinTech, KONTEKS_PROYEK.md). HP/tablet (<1100px) TIDAK
   PERNAH masuk media query ini -> tetap daftar outlet lama
   (.biayatetap-mobile-only), tidak berubah.
   ==================================================================== */
.biayatetap-desktop { display: none; }

@media (min-width: 1100px) {
  #screenBiayaTetapList .biayatetap-mobile-only { display: none; }
  #screenBiayaTetapList .biayatetap-desktop { display: flex; flex-direction: column; gap: 10px; }

  body:has(#screenBiayaTetapList.active) .app-header { display: none !important; }
  body:has(#screenBiayaTetapList.active) { padding-top: 4px; }
  body:has(#screenBiayaTetapList.active) .wrap { width: min(100%, 900px); }

  #screenBiayaTetapList .dashboard-header {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 18px;
    margin-bottom: 0;
    box-shadow: 0 1px 2px rgba(17,24,39,0.03);
    flex-shrink: 0;
  }
  #screenBiayaTetapList .dashboard-header-top { align-items: center; }
  #screenBiayaTetapList .dashboard-title { font-size: 16px; margin-bottom: 0; letter-spacing: -0.01em; }
  #screenBiayaTetapList .dashboard-eyebrow { margin-bottom: 2px; }

  body:has(#screenBiayaTetapList.active) .outlet-filter-pill { max-width: none; }
  body:has(#screenBiayaTetapList.active) .outlet-kategori-badge {
    display: inline-flex; align-items: center; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--brass);
    background: rgba(var(--brass-rgb, 180, 130, 60), 0.10);
    border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.22);
    border-radius: 999px; padding: 2px 8px; margin: 0 2px; white-space: nowrap; flex-shrink: 0;
  }

  /* Tinggi panel ini DIKUNCI via JS (fitDesktopDashboardToViewport_ di
     Script_Fitur_Dashboard.html, teknik SAMA dgn 5 layar lain) supaya
     layar ini tidak bisa discroll - CSS di sini cuma menyiapkan
     strukturnya: overflow:hidden + flex-column. Kontennya cuma 1 kartu
     (".fc-outlet-card" - lihat buildBiayaTetapDesktopCardHtml_ di
     Script_Fitur_BiayaTetapOutlet.html, BUKAN ".fc-card" Dashboard lagi),
     jadi tidak perlu grid multi-kolom - center vertikal saja supaya rapi
     kalau kartu lebih pendek dari tinggi panel yang tersedia. */
  #screenBiayaTetapList .biayatetap-desktop-panel { padding: 18px 20px; display: flex; flex-direction: column; overflow: hidden; }
  #biayaTetapDesktopContent {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* [2026-07-13] Kartu khusus Biaya Tetap Outlet desktop: langsung terbuka
     (total per tahun/bulan/hari + tabel per komponen dgn persentase, tanpa
     tombol panah) dan SENGAJA lebih kecil drpd kartu ".fc-card" di fitur
     lain (Dashboard, Struktur HPP, Harga Layanan) sesuai revisi tampilan. */
  #biayaTetapDesktopContent .fc-outlet-card {
    max-width: 440px;
    width: 100%;
    margin: 0 auto;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
  }
  #biayaTetapDesktopContent .fc-outlet-totals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  #biayaTetapDesktopContent .fc-outlet-total-item { text-align: center; }
  #biayaTetapDesktopContent .fc-outlet-total-item .label { font-size: 9.5px; color: var(--text-faint); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
  #biayaTetapDesktopContent .fc-outlet-total-item .value { font-family: var(--font-display); font-size: 15px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  #biayaTetapDesktopContent .fc-outlet-total-item.highlight .value { color: var(--brass); }

  #biayaTetapDesktopContent .fc-outlet-table { width: 100%; border-collapse: collapse; }
  #biayaTetapDesktopContent .fc-outlet-table th {
    font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-faint);
    text-align: right; font-weight: 600; padding: 0 0 6px 0;
  }
  #biayaTetapDesktopContent .fc-outlet-table th:first-child { text-align: left; }
  #biayaTetapDesktopContent .fc-outlet-table td {
    font-size: 11px; padding: 6px 0; border-top: 1px dashed var(--border);
    text-align: right; font-variant-numeric: tabular-nums; color: var(--text-dim); white-space: nowrap;
  }
  #biayaTetapDesktopContent .fc-outlet-table td:first-child { text-align: left; color: var(--text); font-weight: 600; white-space: normal; }
  #biayaTetapDesktopContent .fc-outlet-table td.pct { color: var(--brass); font-weight: 700; }

  #screenBiayaTetapList .biayatetap-desktop-actions {
    display: flex; justify-content: flex-end; align-items: center;
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #screenBiayaTetapList .biayatetap-desktop-actions .btn-primary { flex: 0 0 auto; min-width: 180px; }
}
</style>
