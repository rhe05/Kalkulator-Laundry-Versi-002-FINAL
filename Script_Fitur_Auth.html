<!--
===============================================================================
FILE: Script_Fitur_Auth.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Fitur Masuk / Daftar / Verifikasi OTP (#authRoot)

FUNGSI:
Validasi form, panggil registerUser/verifyOtp/resendOtp/loginUser (Modul_Auth.gs),
pindah antar 3 layar auth (authGoTo), simpan status login di localStorage.

[2026-07-13] MULTI-TENANT: loginUser/verifyOtp yang sukses sekarang JUGA
mengembalikan sessionToken (Modul_Auth.gs) - token INI yang jadi identitas
sungguhan di server (divalidasi tiap panggilan lewat withTenant_/callServer_,
lihat Script_Shared_Util.html), BUKAN email di localStorage. Email di
localStorage cuma penanda UI (isi form login otomatis dsb) - kalau token
hilang/tidak valid, server akan menolak dgn {ok:false, code:"UNAUTHORIZED"}
dan callServer_ otomatis memaksa logout.

Include SEBELUM Script_Boot_Main.html (bootApp() manggil isAuthLoggedIn()
dari sini utk memutuskan tampilkan #authRoot atau #appRoot).
===============================================================================
-->
<script>
"use strict";
  var AUTH_STORAGE_KEY_ = "klAuthUserEmail";
  var AUTH_SESSION_STORAGE_KEY_ = "klAuthSessionToken";
  var authPendingEmail_ = "";
  var authPendingResetEmail_ = "";

  // [ADMIN UI] Cuma dipakai utk tampil/sembunyikan kartu menu "Buat Akun
  // Afiliator" (authApplyAdminUI_ di bawah) - HANYA kosmetik client. Kalau
  // email ini beda dari yang dicek server (AUTH_ADMIN_EMAIL_, Modul_Auth.gs),
  // backend tetap menolak - sinkronkan manual kalau email admin pernah ganti.
  var AUTH_ADMIN_EMAIL_CLIENT_ = "rheza354@gmail.com";

  function isAuthLoggedIn() {
    try {
      return !!window.localStorage.getItem(AUTH_STORAGE_KEY_) && !!window.localStorage.getItem(AUTH_SESSION_STORAGE_KEY_);
    } catch (e) {
      return false;
    }
  }

  window.authGetSessionToken_ = function () {
    try {
      return window.localStorage.getItem(AUTH_SESSION_STORAGE_KEY_) || "";
    } catch (e) {
      return "";
    }
  };

  function authSetLoggedIn_(email, sessionToken) {
    try {
      window.localStorage.setItem(AUTH_STORAGE_KEY_, email);
      window.localStorage.setItem(AUTH_SESSION_STORAGE_KEY_, sessionToken || "");
    } catch (e) {}
  }

  function authClearLoggedIn_() {
    try {
      window.localStorage.removeItem(AUTH_STORAGE_KEY_);
      window.localStorage.removeItem(AUTH_SESSION_STORAGE_KEY_);
    } catch (e) {}
  }

  window.authGoTo = function (name) {
    ["authScreenLogin", "authScreenRegister", "authScreenOtp", "authScreenForgotPassword", "authScreenResetPassword"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove("active");
    });
    var target = document.getElementById("authScreen" + name.charAt(0).toUpperCase() + name.slice(1));
    if (target) target.classList.add("active");
    ["authLoginError", "authRegisterError", "authOtpError", "authForgotError", "authResetError"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.style.display = "none";
    });
  };

  window.toggleAuthPassword = function (inputId, btn) {
    var input = document.getElementById(inputId);
    if (!input) return;
    input.type = input.type === "password" ? "text" : "password";
  };

  function authShowError_(elId, message) {
    var el = document.getElementById(elId);
    if (!el) return;
    el.textContent = message;
    el.style.display = "block";
  }

  function authIsValidGmailClient_(email) {
    var e = String(email || "").trim().toLowerCase();
    var basicEmailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!basicEmailRe.test(e)) return false;
    return e.slice(-10) === "@gmail.com";
  }

  window.submitAuthLogin = function () {
    var emailEl = document.getElementById("authLoginEmail");
    var passwordEl = document.getElementById("authLoginPassword");
    var btn = document.getElementById("authLoginBtn");
    var email = emailEl ? emailEl.value.trim() : "";
    var password = passwordEl ? passwordEl.value : "";

    if (!email || !password) {
      authShowError_("authLoginError", "Email dan password wajib diisi.");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Memeriksa..."; }
    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) { btn.disabled = false; btn.textContent = "Masuk"; }
        if (!res || !res.ok) {
          authShowError_("authLoginError", (res && res.error) || "Gagal masuk.");
          return;
        }
        authSetLoggedIn_(res.data.email, res.data.sessionToken);
        authEnterApp_();
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Masuk"; }
        authShowError_("authLoginError", err && err.message ? err.message : String(err));
      })
      .loginUser(email, password);
  };

  window.submitAuthRegister = function () {
    var emailEl = document.getElementById("authRegisterEmail");
    var passwordEl = document.getElementById("authRegisterPassword");
    var accessCodeEl = document.getElementById("authRegisterAccessCode");
    var btn = document.getElementById("authRegisterBtn");
    var email = emailEl ? emailEl.value.trim() : "";
    var password = passwordEl ? passwordEl.value : "";
    var accessCode = accessCodeEl ? accessCodeEl.value.trim() : "";

    if (!authIsValidGmailClient_(email)) {
      authShowError_("authRegisterError", "Email harus alamat Gmail yang valid (contoh: nama@gmail.com).");
      return;
    }
    if (password.length < 6) {
      authShowError_("authRegisterError", "Password minimal 6 karakter.");
      return;
    }
    if (!accessCode) {
      authShowError_("authRegisterError", "Kode akses wajib diisi (dari Lynk.id atau afiliator).");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Mengirim OTP..."; }
    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) { btn.disabled = false; btn.textContent = "Daftar"; }
        if (!res || !res.ok) {
          authShowError_("authRegisterError", (res && res.error) || "Gagal mendaftar.");
          return;
        }
        authPendingEmail_ = res.data.email;
        var label = document.getElementById("authOtpEmailLabel");
        if (label) label.textContent = res.data.email;
        var otpInput = document.getElementById("authOtpCode");
        if (otpInput) otpInput.value = "";
        authGoTo("otp");
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Daftar"; }
        authShowError_("authRegisterError", err && err.message ? err.message : String(err));
      })
      .registerUser(email, password, accessCode);
  };

  window.submitAuthOtp = function () {
    var codeEl = document.getElementById("authOtpCode");
    var btn = document.getElementById("authOtpBtn");
    var code = codeEl ? codeEl.value.trim() : "";

    if (!/^\d{4}$/.test(code)) {
      authShowError_("authOtpError", "Kode OTP harus 4 angka.");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Memverifikasi..."; }
    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) { btn.disabled = false; btn.textContent = "Verifikasi"; }
        if (!res || !res.ok) {
          authShowError_("authOtpError", (res && res.error) || "Verifikasi gagal.");
          return;
        }
        var loginEmailEl = document.getElementById("authLoginEmail");
        if (loginEmailEl) loginEmailEl.value = res.data.email;
        authPendingEmail_ = "";
        authGoTo("login");
        if (typeof showToast === "function") showToast("Akun berhasil diverifikasi. Silakan masuk.", "ok");
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Verifikasi"; }
        authShowError_("authOtpError", err && err.message ? err.message : String(err));
      })
      .verifyOtp(authPendingEmail_, code);
  };

  window.resendAuthOtp = function () {
    if (!authPendingEmail_) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) {
          authShowError_("authOtpError", (res && res.error) || "Gagal mengirim ulang OTP.");
          return;
        }
        if (typeof showToast === "function") showToast("Kode OTP baru sudah dikirim.", "ok");
      })
      .withFailureHandler(function (err) {
        authShowError_("authOtpError", err && err.message ? err.message : String(err));
      })
      .resendOtp(authPendingEmail_);
  };

  window.submitAuthForgotPassword = function () {
    var emailEl = document.getElementById("authForgotEmail");
    var btn = document.getElementById("authForgotBtn");
    var email = emailEl ? emailEl.value.trim() : "";

    if (!authIsValidGmailClient_(email)) {
      authShowError_("authForgotError", "Email harus alamat Gmail yang valid (contoh: nama@gmail.com).");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Mengirim..."; }
    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) { btn.disabled = false; btn.textContent = "Kirim Kode Reset"; }
        if (!res || !res.ok) {
          authShowError_("authForgotError", (res && res.error) || "Gagal mengirim kode reset.");
          return;
        }
        authPendingResetEmail_ = res.data.email;
        var label = document.getElementById("authResetEmailLabel");
        if (label) label.textContent = res.data.email;
        var codeInput = document.getElementById("authResetCode");
        var passInput = document.getElementById("authResetNewPassword");
        if (codeInput) codeInput.value = "";
        if (passInput) passInput.value = "";
        authGoTo("resetPassword");
        if (typeof showToast === "function") showToast("Kalau email terdaftar, kode reset sudah dikirim.", "ok");
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Kirim Kode Reset"; }
        authShowError_("authForgotError", err && err.message ? err.message : String(err));
      })
      .requestPasswordReset(email);
  };

  window.resendAuthForgotPassword = function () {
    if (!authPendingResetEmail_) return;
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) {
          authShowError_("authResetError", (res && res.error) || "Gagal mengirim ulang kode.");
          return;
        }
        if (typeof showToast === "function") showToast("Kode reset baru sudah dikirim (kalau email terdaftar).", "ok");
      })
      .withFailureHandler(function (err) {
        authShowError_("authResetError", err && err.message ? err.message : String(err));
      })
      .requestPasswordReset(authPendingResetEmail_);
  };

  window.submitAuthResetPassword = function () {
    var codeEl = document.getElementById("authResetCode");
    var passEl = document.getElementById("authResetNewPassword");
    var btn = document.getElementById("authResetBtn");
    var code = codeEl ? codeEl.value.trim() : "";
    var newPassword = passEl ? passEl.value : "";

    if (!/^\d{4}$/.test(code)) {
      authShowError_("authResetError", "Kode reset harus 4 angka.");
      return;
    }
    if (newPassword.length < 6) {
      authShowError_("authResetError", "Password baru minimal 6 karakter.");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Memproses..."; }
    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) { btn.disabled = false; btn.textContent = "Reset Password"; }
        if (!res || !res.ok) {
          authShowError_("authResetError", (res && res.error) || "Gagal reset password.");
          return;
        }
        var loginEmailEl = document.getElementById("authLoginEmail");
        var loginPasswordEl = document.getElementById("authLoginPassword");
        if (loginEmailEl) loginEmailEl.value = res.data.email;
        if (loginPasswordEl) loginPasswordEl.value = "";
        authPendingResetEmail_ = "";
        authGoTo("login");
        if (typeof showToast === "function") showToast("Password berhasil direset. Silakan masuk.", "ok");
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Reset Password"; }
        authShowError_("authResetError", err && err.message ? err.message : String(err));
      })
      .confirmPasswordReset(authPendingResetEmail_, code, newPassword);
  };

  window.authLogout = function () {
    // Hapus sesi di server DULU (selagi token masih ada di localStorage utk
    // dikirim) - baru clear localStorage. Kalau gagal (mis. sudah offline),
    // tetap lanjut logout di sisi client, tidak menghalangi user keluar.
    try {
      var token = window.authGetSessionToken_();
      if (token) {
        google.script.run
          .withSuccessHandler(function () {})
          .withFailureHandler(function () {})
          .logoutUser(token);
      }
    } catch (e) {}

    authClearLoggedIn_();
    var appRootEl = document.getElementById("appRoot");
    var authRootEl = document.getElementById("authRoot");
    var appHeaderEl = document.getElementById("appHeader");
    var logoutBtnEl = document.getElementById("authLogoutBtn");
    if (appRootEl) appRootEl.style.display = "none";
    if (authRootEl) authRootEl.style.display = "flex";
    if (appHeaderEl) appHeaderEl.style.display = "none";
    if (logoutBtnEl) logoutBtnEl.style.display = "none";
    var footerEl = document.getElementById("footerBar");
    if (footerEl) footerEl.style.display = "none";
    if (typeof sidebarHide_ === "function") sidebarHide_();
    authGoTo("login");
  };

  // authEnterApp_: dipanggil setelah login sukses ATAU saat bootApp()
  // mendeteksi sesi login masih ada (localStorage) - tampilkan #appRoot +
  // header app + tombol Keluar, sembunyikan #authRoot, lanjut ke alur
  // showScreen("menu") spt biasa.
  function authEnterApp_() {
    var appRootEl = document.getElementById("appRoot");
    var authRootEl = document.getElementById("authRoot");
    var appHeaderEl = document.getElementById("appHeader");
    var logoutBtnEl = document.getElementById("authLogoutBtn");
    if (authRootEl) authRootEl.style.display = "none";
    if (appRootEl) appRootEl.style.display = "block";
    if (appHeaderEl) appHeaderEl.style.display = "flex";
    if (logoutBtnEl) logoutBtnEl.style.display = "inline-flex";
    if (typeof sidebarShow_ === "function") sidebarShow_();
    authApplyAdminUI_();
    showScreen("menu");
  }

  // [ADMIN UI] Tampilkan kartu "Buat Akun Afiliator" (HP, screenMenu) DAN
  // item sidebar (desktop, Screen_Sidebar.html - navigasi desktop TERPISAH
  // dari kartu menu HP, makanya dua-duanya perlu di-toggle di sini) HANYA
  // kalau email yang login sama dengan AUTH_ADMIN_EMAIL_CLIENT_ - murni
  // kosmetik, lihat catatan di deklarasi AUTH_ADMIN_EMAIL_CLIENT_ di atas.
  function authApplyAdminUI_() {
    var email = "";
    try { email = window.localStorage.getItem(AUTH_STORAGE_KEY_) || ""; } catch (e) {}
    var isAdmin = email.trim().toLowerCase() === AUTH_ADMIN_EMAIL_CLIENT_;

    var cardEl = document.getElementById("adminAfiliatorMenuCard");
    if (cardEl) cardEl.style.display = isAdmin ? "flex" : "none";

    var sidebarItemEl = document.getElementById("adminAfiliatorSidebarItem");
    if (sidebarItemEl) sidebarItemEl.style.display = isAdmin ? "flex" : "none";
  }
</script>
