<!--
===============================================================================
FILE: Script_Fitur_Auth.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Fitur Masuk / Daftar / Verifikasi Email (klik link) / Lupa Password
(#authRoot)

FUNGSI:
Validasi form, panggil registerUser/loginUser/requestPasswordReset
(Modul_Auth.gs) + wrapper Firebase (Script_Fitur_FirebaseAuth.html) utk
verifikasi email lewat KLIK LINK (bukan lagi ketik kode OTP/reset manual).
LOGIN TETAP email+password (loginUser, TIDAK berubah). Pindah antar layar
auth (authGoTo), simpan status login di localStorage.

[2026-07-22] Verifikasi pendaftaran & reset password sekarang lewat magic
link Firebase (klik link di email) - lihat authHandleBootAuth_ di bawah,
dipanggil dari Script_Boot_Main.html SEBELUM bootReveal_ memutuskan tampilan
(karena deteksi magic link itu ASYNC). idToken hasil klik link HANYA dipakai
membuktikan kepemilikan email (dikirim ke verifyEmailMagicLink/
confirmPasswordResetMagicLink) - TIDAK PERNAH dipakai untuk auto-login, user
tetap harus ketik password di layar Masuk seperti biasa.

[2026-07-13] MULTI-TENANT: loginUser yang sukses mengembalikan sessionToken
(Modul_Auth.gs) - token INI yang jadi identitas sungguhan di server
(divalidasi tiap panggilan lewat withTenant_/callServer_, lihat
Script_Shared_Util.html), BUKAN email di localStorage. Email di localStorage
cuma penanda UI (isi form login otomatis dsb) - kalau token hilang/tidak
valid, server akan menolak dgn {ok:false, code:"UNAUTHORIZED"} dan
callServer_ otomatis memaksa logout.

Include SEBELUM Script_Boot_Main.html (bootApp() manggil isAuthLoggedIn()
dari sini utk memutuskan tampilkan #authRoot atau #appRoot) & SETELAH
Script_Fitur_FirebaseAuth.html (perlu wrapper authFirebase*_ dari situ).
===============================================================================
-->
<script>
"use strict";
  var AUTH_STORAGE_KEY_ = "klAuthUserEmail";
  var AUTH_SESSION_STORAGE_KEY_ = "klAuthSessionToken";
  var authPendingEmail_ = "";
  var authPendingResetEmail_ = "";
  var authCheckEmailPurpose_ = ""; // "register" | "resetPassword" - dipakai tombol Kirim Ulang
  var authPendingResetIdToken_ = ""; // idToken hasil klik link reset password, dipakai submitAuthResetPassword

  // [ADMIN UI] Cuma dipakai utk tampil/sembunyikan kartu menu "Buat Akun
  // Afiliator" (authApplyAdminUI_ di bawah) - HANYA kosmetik client. Kalau
  // email ini beda dari yang dicek server (AUTH_ADMIN_EMAIL_, Modul_Auth.gs),
  // backend tetap menolak - sinkronkan manual kalau email admin pernah ganti.
  var AUTH_ADMIN_EMAIL_CLIENT_ = "rheza354@gmail.com";

  function isAuthLoggedIn() {
    try {
      return !!window.localStorage.getItem(AUTH_STORAGE_KEY_) && !!window.localStorage.getItem(AUTH_SESSION_STORAGE_KEY_);
    } catch (e) {
      return false;
    }
  }

  window.authGetSessionToken_ = function () {
    try {
      return window.localStorage.getItem(AUTH_SESSION_STORAGE_KEY_) || "";
    } catch (e) {
      return "";
    }
  };

  function authSetLoggedIn_(email, sessionToken) {
    try {
      window.localStorage.setItem(AUTH_STORAGE_KEY_, email);
      window.localStorage.setItem(AUTH_SESSION_STORAGE_KEY_, sessionToken || "");
    } catch (e) {}
  }

  function authClearLoggedIn_() {
    try {
      window.localStorage.removeItem(AUTH_STORAGE_KEY_);
      window.localStorage.removeItem(AUTH_SESSION_STORAGE_KEY_);
    } catch (e) {}
  }

  window.authGoTo = function (name) {
    ["authScreenLogin", "authScreenRegister", "authScreenCheckEmail", "authScreenConfirmEmail", "authScreenForgotPassword", "authScreenResetPassword"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove("active");
    });
    var target = document.getElementById("authScreen" + name.charAt(0).toUpperCase() + name.slice(1));
    if (target) target.classList.add("active");
    ["authLoginError", "authRegisterError", "authCheckEmailError", "authConfirmEmailError", "authForgotError", "authResetError"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.style.display = "none";
    });
  };

  /**
   * authMapFirebaseError_: petakan kode error Firebase Auth (Inggris) ke
   * pesan Indonesia yang jelas - dipakai di semua tempat yang menangani
   * hasil authFirebaseSendMagicLink_/authFirebaseCompleteMagicLink_. Terima
   * error OBJECT (bukan cuma code) supaya kalau errornya BUKAN dari Firebase
   * (mis. Firebase SDK gagal dimuat/diinisialisasi), pesan .message asli
   * tetap tampil - jangan sampai user cuma lihat "gagal" tanpa info sama
   * sekali (itu yang bikin susah didiagnosis tanpa tebak-tebakan).
   */
  function authMapFirebaseError_(err) {
    var code = err && err.code;
    switch (code) {
      case "auth/invalid-action-code":
        return "Link ini sudah pernah dipakai atau tidak valid. Ulangi dari awal.";
      case "auth/expired-action-code":
        return "Link ini sudah kedaluwarsa. Ulangi dari awal.";
      case "auth/too-many-requests":
        return "Terlalu banyak permintaan. Coba lagi sebentar lagi.";
      case "auth/quota-exceeded":
        return "Terlalu banyak email dikirim dalam waktu singkat. Mohon tunggu beberapa saat sebelum mencoba lagi (hindari klik Daftar/Kirim Ulang berkali-kali cepat untuk email yang sama).";
      case "auth/invalid-email":
        return "Alamat email tidak valid.";
      case "auth/user-disabled":
        return "Akun ini dinonaktifkan.";
      default:
        // Kode belum dikenal (atau bukan error Firebase sama sekali) -
        // tampilkan detail asli (bukan cuma pesan generik) supaya kalau
        // masih terjadi, bisa dilaporkan balik & didiagnosis tanpa
        // tebak-tebakan.
        var detail = code || (err && err.message) || "";
        return detail ? ("Verifikasi email gagal (" + detail + "). Coba lagi.") : "Verifikasi email gagal. Coba lagi.";
    }
  }

  window.toggleAuthPassword = function (inputId, btn) {
    var input = document.getElementById(inputId);
    if (!input) return;
    input.type = input.type === "password" ? "text" : "password";
  };

  function authShowError_(elId, message) {
    var el = document.getElementById(elId);
    if (!el) return;
    el.textContent = message;
    el.style.display = "block";
  }

  function authIsValidGmailClient_(email) {
    var e = String(email || "").trim().toLowerCase();
    var basicEmailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!basicEmailRe.test(e)) return false;
    return e.slice(-10) === "@gmail.com";
  }

  window.submitAuthLogin = function () {
    var emailEl = document.getElementById("authLoginEmail");
    var passwordEl = document.getElementById("authLoginPassword");
    var btn = document.getElementById("authLoginBtn");
    var email = emailEl ? emailEl.value.trim() : "";
    var password = passwordEl ? passwordEl.value : "";

    if (!email || !password) {
      authShowError_("authLoginError", "Email dan password wajib diisi.");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Memeriksa..."; }

    // Loading hyper-premium mode "await": bar naik ~92% & MENUNGGU server -
    // begitu login OK, premiumLoaderComplete melesat ke 100% lalu masuk app.
    // Kalau gagal, premiumLoaderFail menutupnya & error tampil di kartu login.
    if (typeof premiumLoaderShow === "function") {
      premiumLoaderShow({ status: "Memverifikasi akun Anda", mode: "await" });
    }

    function loginFail_(msg) {
      if (btn) { btn.disabled = false; btn.textContent = "Masuk"; }
      if (typeof premiumLoaderFail === "function") premiumLoaderFail();
      authShowError_("authLoginError", msg);
    }
    function loginOk_(res) {
      if (btn) { btn.disabled = false; btn.textContent = "Masuk"; }
      authSetLoggedIn_(res.data.email, res.data.sessionToken);
      if (typeof premiumLoaderComplete === "function") {
        premiumLoaderComplete(function () { authEnterApp_(); });
      } else {
        authEnterApp_();
      }
    }

    // [2026-07-22 - PERFORMA] 2 jalur: kalau akun sudah hashVersion 3, hash
    // dihitung DI BROWSER (authDeriveHash_, ~10ms) & server tinggal
    // membandingkan string (loginUserV3, TANPA hashing di server -
    // menghilangkan 6+ detik). Akun LAMA (belum pernah lewat sini) tetap
    // pakai jalur lambat SEKALI (loginUser, password mentah, server yang
    // hash) - lalu otomatis di-upgrade ke v3 di belakang layar supaya
    // login BERIKUTNYA sudah cepat juga.
    google.script.run
      .withSuccessHandler(function (saltRes) {
        if (!saltRes || !saltRes.ok) {
          loginFail_((saltRes && saltRes.error) || "Gagal memeriksa akun.");
          return;
        }
        if (saltRes.data.hashVersion === 3) {
          authDeriveHash_(password, saltRes.data.salt).then(function (hash) {
            google.script.run
              .withSuccessHandler(function (res) {
                if (!res || !res.ok) { loginFail_((res && res.error) || "Gagal masuk."); return; }
                loginOk_(res);
              })
              .withFailureHandler(function (err) { loginFail_(err && err.message ? err.message : String(err)); })
              .loginUserV3(email, hash);
          }).catch(function (err) {
            loginFail_(err && err.message ? err.message : String(err));
          });
          return;
        }

        // Jalur lambat (akun belum ter-upgrade) - SAMA seperti sebelumnya.
        google.script.run
          .withSuccessHandler(function (res) {
            if (!res || !res.ok) { loginFail_((res && res.error) || "Gagal masuk."); return; }
            loginOk_(res);
            // Upgrade ke hashVersion 3 di belakang layar - TIDAK menunda
            // masuk app, gagal pun tidak masalah (tetap lewat jalur lambat
            // lagi di login berikutnya, dicoba ulang otomatis nanti).
            if (res.data.needsHashUpgrade && res.data.salt) {
              authDeriveHash_(password, res.data.salt).then(function (hash) {
                google.script.run
                  .withSuccessHandler(function () {})
                  .withFailureHandler(function () {})
                  .upgradeAuthHashV3(res.data.sessionToken, hash);
              }).catch(function () {});
            }
          })
          .withFailureHandler(function (err) { loginFail_(err && err.message ? err.message : String(err)); })
          .loginUser(email, password);
      })
      .withFailureHandler(function (err) {
        loginFail_(err && err.message ? err.message : String(err));
      })
      .getAuthSalt(email);
  };

  window.submitAuthRegister = function () {
    var emailEl = document.getElementById("authRegisterEmail");
    var passwordEl = document.getElementById("authRegisterPassword");
    var btn = document.getElementById("authRegisterBtn");
    var email = emailEl ? emailEl.value.trim() : "";
    var password = passwordEl ? passwordEl.value : "";

    if (!authIsValidGmailClient_(email)) {
      authShowError_("authRegisterError", "Email harus alamat Gmail yang valid (contoh: nama@gmail.com).");
      return;
    }
    if (password.length < 6) {
      authShowError_("authRegisterError", "Password minimal 6 karakter.");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Mendaftar..."; }
    if (typeof premiumLoaderShow === "function") {
      premiumLoaderShow({ status: "Mendaftarkan akun Anda", mode: "await" });
    }

    function doneOk_(fn) {
      if (btn) { btn.disabled = false; btn.textContent = "Daftar"; }
      if (typeof premiumLoaderComplete === "function") premiumLoaderComplete(fn);
      else fn();
    }
    function doneFail_(msg, elId) {
      if (btn) { btn.disabled = false; btn.textContent = "Daftar"; }
      if (typeof premiumLoaderFail === "function") premiumLoaderFail();
      authShowError_(elId || "authRegisterError", msg);
    }

    // [2026-07-22 - PERFORMA] Hash dihitung DI BROWSER (~10ms) sebelum
    // dikirim - server tidak pernah lihat password mentah utk akun baru,
    // langsung hashVersion 3 (tidak pernah lewat jalur lambat).
    var salt = authGenerateSalt_();
    authDeriveHash_(password, salt).then(function (hash) {
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            doneFail_((res && res.error) || "Gagal mendaftar.");
            return;
          }
          authFirebaseSendMagicLink_(res.data.email, "register").then(function () {
            doneOk_(function () { authShowCheckEmail_(res.data.email, "register"); });
          }).catch(function (err) {
            doneFail_(authMapFirebaseError_(err));
          });
        })
        .withFailureHandler(function (err) {
          doneFail_(err && err.message ? err.message : String(err));
        })
        .registerUser(email, salt, hash);
    }).catch(function (err) {
      doneFail_(err && err.message ? err.message : String(err));
    });
  };

  // authShowCheckEmail_: tampilkan layar "Cek email Anda" (dipakai baik
  // setelah daftar maupun setelah minta reset password - beda cuma `purpose`
  // yang disimpan utk tombol Kirim Ulang & label pesan).
  function authShowCheckEmail_(email, purpose) {
    authCheckEmailPurpose_ = purpose;
    var label = document.getElementById("authCheckEmailLabel");
    if (label) label.textContent = email;
    var titleEl = document.getElementById("authCheckEmailTitle");
    if (titleEl) titleEl.textContent = purpose === "resetPassword" ? "Reset Password" : "Verifikasi Email";
    // Aksen warna ikut alur asalnya - sage kalau dari Daftar, brass (default,
    // dihapus class-nya) kalau dari Lupa Password/reset.
    var cardEl = document.getElementById("authCheckEmailCard");
    if (cardEl) cardEl.classList.toggle("is-accent-sage", purpose === "register");
    authGoTo("checkEmail");
  }

  window.resendAuthCheckEmail_ = function () {
    var email = authFirebaseGetStoredEmail_();
    if (!email || !authCheckEmailPurpose_) return;
    var btn = document.getElementById("authCheckEmailResendBtn");
    if (btn) { btn.disabled = true; btn.textContent = "Mengirim..."; }
    authFirebaseSendMagicLink_(email, authCheckEmailPurpose_).then(function () {
      if (btn) { btn.disabled = false; btn.textContent = "Kirim ulang"; }
      if (typeof showToast === "function") showToast("Link baru sudah dikirim.", "ok");
    }).catch(function (err) {
      if (btn) { btn.disabled = false; btn.textContent = "Kirim ulang"; }
      authShowError_("authCheckEmailError", authMapFirebaseError_(err));
    });
  };

  window.submitAuthForgotPassword = function () {
    var emailEl = document.getElementById("authForgotEmail");
    var btn = document.getElementById("authForgotBtn");
    var email = emailEl ? emailEl.value.trim() : "";

    if (!authIsValidGmailClient_(email)) {
      authShowError_("authForgotError", "Email harus alamat Gmail yang valid (contoh: nama@gmail.com).");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Mengirim..."; }
    if (typeof premiumLoaderShow === "function") {
      premiumLoaderShow({ status: "Memproses permintaan reset", mode: "await" });
    }

    function doneOk_(fn) {
      if (btn) { btn.disabled = false; btn.textContent = "Kirim Kode Reset"; }
      if (typeof premiumLoaderComplete === "function") premiumLoaderComplete(fn);
      else fn();
    }
    function doneFail_(msg) {
      if (btn) { btn.disabled = false; btn.textContent = "Kirim Kode Reset"; }
      if (typeof premiumLoaderFail === "function") premiumLoaderFail();
      authShowError_("authForgotError", msg);
    }

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) {
          doneFail_((res && res.error) || "Gagal memproses permintaan.");
          return;
        }
        authFirebaseSendMagicLink_(res.data.email, "resetPassword").then(function () {
          doneOk_(function () { authShowCheckEmail_(res.data.email, "resetPassword"); });
        }).catch(function (err) {
          doneFail_(authMapFirebaseError_(err));
        });
      })
      .withFailureHandler(function (err) {
        doneFail_(err && err.message ? err.message : String(err));
      })
      .requestPasswordReset(email);
  };

  window.submitAuthResetPassword = function () {
    var passEl = document.getElementById("authResetNewPassword");
    var btn = document.getElementById("authResetBtn");
    var newPassword = passEl ? passEl.value : "";

    if (newPassword.length < 6) {
      authShowError_("authResetError", "Password baru minimal 6 karakter.");
      return;
    }
    if (!authPendingResetIdToken_ || !authPendingResetEmail_) {
      authShowError_("authResetError", "Sesi verifikasi sudah tidak berlaku. Ulangi dari awal.");
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Memproses..."; }

    // [2026-07-22 - PERFORMA] Salt baru + hash dihitung DI BROWSER (~10ms) -
    // password baru langsung hashVersion 3, tidak pernah lewat jalur lambat.
    var salt = authGenerateSalt_();
    authDeriveHash_(newPassword, salt).then(function (hash) {
      google.script.run
        .withSuccessHandler(function (res) {
          if (btn) { btn.disabled = false; btn.textContent = "Reset Password"; }
          if (!res || !res.ok) {
            authShowError_("authResetError", (res && res.error) || "Gagal reset password.");
            return;
          }
          var loginEmailEl = document.getElementById("authLoginEmail");
          var loginPasswordEl = document.getElementById("authLoginPassword");
          if (loginEmailEl) loginEmailEl.value = res.data.email;
          if (loginPasswordEl) loginPasswordEl.value = "";
          authPendingResetEmail_ = "";
          authPendingResetIdToken_ = "";
          authGoTo("login");
          if (typeof showToast === "function") showToast("Password berhasil direset. Silakan masuk.", "ok");
        })
        .withFailureHandler(function (err) {
          if (btn) { btn.disabled = false; btn.textContent = "Reset Password"; }
          authShowError_("authResetError", err && err.message ? err.message : String(err));
        })
        .confirmPasswordResetMagicLink(authPendingResetIdToken_, authPendingResetEmail_, salt, hash);
    }).catch(function (err) {
      if (btn) { btn.disabled = false; btn.textContent = "Reset Password"; }
      authShowError_("authResetError", err && err.message ? err.message : String(err));
    });
  };

  window.authLogout = function () {
    // Hapus sesi di server DULU (selagi token masih ada di localStorage utk
    // dikirim) - baru clear localStorage. Kalau gagal (mis. sudah offline),
    // tetap lanjut logout di sisi client, tidak menghalangi user keluar.
    try {
      var token = window.authGetSessionToken_();
      if (token) {
        google.script.run
          .withSuccessHandler(function () {})
          .withFailureHandler(function () {})
          .logoutUser(token);
      }
    } catch (e) {}

    authClearLoggedIn_();
    var appRootEl = document.getElementById("appRoot");
    var authRootEl = document.getElementById("authRoot");
    var appHeaderEl = document.getElementById("appHeader");
    var logoutBtnEl = document.getElementById("authLogoutBtn");
    if (appRootEl) appRootEl.style.display = "none";
    if (authRootEl) authRootEl.style.display = "flex";
    if (appHeaderEl) appHeaderEl.style.display = "none";
    if (logoutBtnEl) logoutBtnEl.style.display = "none";
    var footerEl = document.getElementById("footerBar");
    if (footerEl) footerEl.style.display = "none";
    if (typeof sidebarHide_ === "function") sidebarHide_();
    authGoTo("login");
  };

  // authEnterApp_: dipanggil setelah login sukses ATAU saat bootApp()
  // mendeteksi sesi login masih ada (localStorage) - tampilkan #appRoot +
  // header app + tombol Keluar, sembunyikan #authRoot, lanjut ke alur
  // showScreen("menu") spt biasa.
  function authEnterApp_() {
    var appRootEl = document.getElementById("appRoot");
    var authRootEl = document.getElementById("authRoot");
    var appHeaderEl = document.getElementById("appHeader");
    var logoutBtnEl = document.getElementById("authLogoutBtn");
    if (authRootEl) authRootEl.style.display = "none";
    if (appRootEl) appRootEl.style.display = "block";
    if (appHeaderEl) appHeaderEl.style.display = "flex";
    if (logoutBtnEl) logoutBtnEl.style.display = "inline-flex";
    if (typeof sidebarShow_ === "function") sidebarShow_();
    authApplyAdminUI_();
    showScreen("menu");
  }

  // [ADMIN UI] Tampilkan kartu "Panel Admin" (HP, screenMenu) DAN
  // item sidebar (desktop, Screen_Sidebar.html - navigasi desktop TERPISAH
  // dari kartu menu HP, makanya dua-duanya perlu di-toggle di sini) HANYA
  // kalau email yang login sama dengan AUTH_ADMIN_EMAIL_CLIENT_ - murni
  // kosmetik, lihat catatan di deklarasi AUTH_ADMIN_EMAIL_CLIENT_ di atas.
  function authApplyAdminUI_() {
    var email = "";
    try { email = window.localStorage.getItem(AUTH_STORAGE_KEY_) || ""; } catch (e) {}
    var isAdmin = email.trim().toLowerCase() === AUTH_ADMIN_EMAIL_CLIENT_;

    var cardEl = document.getElementById("adminAfiliatorMenuCard");
    if (cardEl) cardEl.style.display = isAdmin ? "flex" : "none";

    var sidebarItemEl = document.getElementById("adminAfiliatorSidebarItem");
    if (sidebarItemEl) sidebarItemEl.style.display = isAdmin ? "flex" : "none";
  }

  // ---- Boot: selesaikan magic link (kalau ada) SEBELUM tampilan normal ----

  var authBootConfirmEmailCallback_ = null;

  /**
   * authHandleBootAuth_: dipanggil dari Script_Boot_Main.html SEBELUM
   * bootReveal_ (deteksi magic link ASYNC, bootReveal_ butuh keputusan
   * SEGERA). Kalau URL BUKAN magic link (kasus normal, jauh lebih sering) ->
   * langsung panggil callback() (=bootReveal_), TIDAK ADA PERUBAHAN
   * perilaku. Kalau URL magic link -> proses verifikasi dulu, arahkan ke
   * layar yang sesuai, BARU TIDAK memanggil callback() (supaya bootReveal_
   * tidak menimpa layar yang baru diarahkan dengan layar login polos).
   */
  window.authHandleBootAuth_ = function (callback) {
    if (typeof authFirebaseIsMagicLink_ !== "function" || !authFirebaseIsMagicLink_()) {
      callback();
      return;
    }

    var authRootEl = document.getElementById("authRoot");
    if (authRootEl) authRootEl.style.display = "flex";

    var params;
    try { params = new URLSearchParams(window.location.search); } catch (e) { params = null; }
    var purpose = (params && params.get("authPurpose")) || "register";

    function cleanUrl_() {
      try { window.history.replaceState({}, document.title, window.location.pathname); } catch (e) {}
    }

    function loaderDone_(fn) {
      if (typeof premiumLoaderComplete === "function") premiumLoaderComplete(fn);
      else fn();
    }
    function loaderFail_(fn) {
      if (typeof premiumLoaderFail === "function") premiumLoaderFail();
      fn();
    }

    function finishWithError_(err) {
      authFirebaseClearStoredEmail_();
      cleanUrl_();
      loaderFail_(function () {
        authGoTo("login");
        authShowError_("authLoginError", authMapFirebaseError_(err));
      });
    }

    function proceedWithEmail_(email) {
      if (typeof premiumLoaderShow === "function") {
        premiumLoaderShow({ status: "Menyelesaikan verifikasi", mode: "await" });
      }

      authFirebaseCompleteMagicLink_(email).then(function (idToken) {
        authFirebaseClearStoredEmail_();
        cleanUrl_();

        if (purpose === "resetPassword") {
          authPendingResetIdToken_ = idToken;
          authPendingResetEmail_ = email;
          var lbl = document.getElementById("authResetEmailLabel");
          if (lbl) lbl.textContent = email;
          loaderDone_(function () { authGoTo("resetPassword"); });
          return;
        }

        google.script.run
          .withSuccessHandler(function (res) {
            if (!res || !res.ok) {
              loaderFail_(function () {
                authGoTo("login");
                authShowError_("authLoginError", (res && res.error) || "Verifikasi email gagal.");
              });
              return;
            }
            var loginEmailEl = document.getElementById("authLoginEmail");
            if (loginEmailEl) loginEmailEl.value = res.data.email;
            loaderDone_(function () {
              authGoTo("login");
              if (typeof showToast === "function") showToast("Email terverifikasi. Silakan masuk dengan password Anda.", "ok");
            });
          })
          .withFailureHandler(function (err) {
            loaderFail_(function () {
              authGoTo("login");
              authShowError_("authLoginError", err && err.message ? err.message : String(err));
            });
          })
          .verifyEmailMagicLink(idToken, email);
      }).catch(function (err) {
        finishWithError_(err);
      });
    }

    var storedEmail = authFirebaseGetStoredEmail_();
    if (storedEmail) {
      proceedWithEmail_(storedEmail);
    } else {
      // Link dibuka di device/browser LAIN dari yang minta - localStorage
      // kosong, tidak tahu email siapa yang harus dipakai. Minta user
      // konfirmasi email-nya dulu.
      authBootConfirmEmailCallback_ = proceedWithEmail_;
      authGoTo("confirmEmail");
    }
  };

  window.submitAuthConfirmEmail = function () {
    var emailEl = document.getElementById("authConfirmEmailInput");
    var email = emailEl ? emailEl.value.trim() : "";
    if (!authIsValidGmailClient_(email)) {
      authShowError_("authConfirmEmailError", "Email harus alamat Gmail yang valid (contoh: nama@gmail.com).");
      return;
    }
    if (typeof authBootConfirmEmailCallback_ === "function") {
      authBootConfirmEmailCallback_(email);
      authBootConfirmEmailCallback_ = null;
    }
  };
</script>
