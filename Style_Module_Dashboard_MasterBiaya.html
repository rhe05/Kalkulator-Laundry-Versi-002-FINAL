<!--
===============================================================================
FILE: Style_Module_Dashboard_MasterBiaya.html  (BAGIAN 6 dari 9)
Bagian dari Style_Module_Dashboard (peta lengkap di file utama).
ISI: Kartu Master Biaya (mb-card, mb-komponen-*, progress bar, warna komponen).
Catatan: susunan 2-baris KHUSUS panel desktop #desktopMasterBiaya ada di file
utama & DesktopDensity (scoped); file ini gaya dasar (dipakai bareng HP).
===============================================================================
-->
<style>
  /* === MASTER BIAYA CARD === */
  .mb-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .mb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .mb-total-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .mb-total-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-faint);
  }

  .mb-total-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .mb-status {
    flex-shrink: 0;
  }

  .mb-komponen-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .mb-komponen-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .mb-komponen-top {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .mb-komponen-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    width: 74px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mb-komponen-value {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    width: 62px;
    flex-shrink: 0;
    text-align: right;
    white-space: nowrap;
  }

  .mb-komponen-persen {
    font-size: 10px;
    color: var(--text-faint);
    width: 46px;
    flex-shrink: 0;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .mb-progress-bar {
    height: 6px;
    flex: 1;
    background: var(--panel-2);
    border-radius: 3px;
  }


  .mb-progress-fill {
    height: 100%;
    border-radius: 3px;
  }

  .mb-progress-fill.mb-gas { background: var(--brass); }
  .mb-progress-fill.mb-listrik { background: var(--volt, #e8d44d); }
  .mb-progress-fill.mb-air { background: var(--sage); }
  .mb-progress-fill.mb-nota { background: var(--text-dim); }
  .mb-progress-fill.mb-chemical { background: var(--indigo, #6366f1); }
  .mb-progress-fill.mb-packing { background: var(--clay, #A3765C); }

  .mb-missing {
    font-size: 10.5px;
    color: var(--brass);
    padding: 6px 10px;
    background: rgba(180, 130, 60, 0.08);
    border-radius: var(--radius);
  }
  .mb-bar-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .mb-komponen-row.zero .mb-komponen-label,
  .mb-komponen-row.zero .mb-komponen-persen { opacity: 0.35; }
  .mb-zero-label { font-size: 10px; color: var(--text-faint); font-style: italic; }

  .mb-komponen-unit { font-size: 9.5px; font-weight: 500; color: var(--text-faint); }

  /* === END MASTER BIAYA CARD === */

  /* ====================================================================
     LAYAR MASTER BIAYA (#screenMasterBiaya) - KHUSUS DESKTOP (>=1100px).
     Konsep sama dgn Dashboard & Profil Outlet: satu kartu besar utk outlet
     terpilih, berisi 6 komponen biaya (Gas/Listrik/Air/Chemical/Packing/
     Nota) sekaligus + tombol kelola (CRUD) per komponen. Brand "Kalkulator
     Laundry" + tombol Back dibuang, cukup 1 layar. HP/tablet (<1100px)
     TIDAK PERNAH masuk media query ini -> tetap pakai pill kategori +
     pilih cabang lama (.masterbiaya-mobile-only), tidak berubah.
     ==================================================================== */
  .masterbiaya-desktop { display: none; }

  @media (min-width: 1100px) {
    #screenMasterBiaya .masterbiaya-mobile-only { display: none; }
    #screenMasterBiaya .masterbiaya-desktop { display: flex; flex-direction: column; gap: 10px; }

    body:has(#screenMasterBiaya.active) .app-header { display: none !important; }
    body:has(#screenMasterBiaya.active) { padding-top: 4px; }
    body:has(#screenMasterBiaya.active) .wrap { width: min(100%, 1280px); }

    #screenMasterBiaya .dashboard-header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 18px;
      margin-bottom: 0;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03);
      flex-shrink: 0;
    }
    #screenMasterBiaya .dashboard-header-top { align-items: center; }
    #screenMasterBiaya .dashboard-title { font-size: 16px; margin-bottom: 0; letter-spacing: -0.01em; }

    body:has(#screenMasterBiaya.active) .outlet-filter-pill { max-width: none; }
    body:has(#screenMasterBiaya.active) .outlet-kategori-badge {
      display: inline-flex; align-items: center; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; color: var(--brass);
      background: rgba(var(--brass-rgb, 180, 130, 60), 0.10);
      border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.22);
      border-radius: 999px; padding: 2px 8px; margin: 0 2px; white-space: nowrap; flex-shrink: 0;
    }

    /* Tinggi panel ini DIKUNCI via JS (fitDesktopDashboardToViewport_ di
       Script_Fitur_Dashboard.html, teknik SAMA dgn Dashboard) supaya layar
       ini tidak bisa discroll - CSS di sini cuma menyiapkan strukturnya:
       overflow:hidden + flex-column, grid 6 kartu di dalamnya menyesuaikan
       tinggi lewat grid-auto-rows:1fr, TIDAK PERNAH memicu scrollbar. */
    #screenMasterBiaya .masterbiaya-desktop-panel {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #masterBiayaDesktopGrid { flex: 1; min-height: 0; overflow: hidden; }

    /* Grid 6 kartu komponen - 3 kolom x 2 baris, tinggi baris menyesuaikan
       ruang tersedia (grid-auto-rows:1fr) supaya selalu muat 1 layar. Tiap
       kartu ADALAH .gas-card apa adanya (dipakai ulang persis, bukan
       ditiru-tiru) - tambahan di sini cuma titik warna kategori (.dot) &
       varian warna highlight per kategori, supaya bahasa visual "ringkasan
       fitur" konsisten di seluruh aplikasi (lihat KONTEKS_PROYEK.md,
       standar Hyper-Premium FinTech). */
    .mb-desktop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
      gap: 12px;
      height: 100%;
    }
    .mb-desktop-card.gas-card {
      margin-bottom: 0;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .mb-desktop-card.is-empty { opacity: 0.78; }
    .mb-desktop-card .gas-card-top { margin-bottom: 4px; flex-shrink: 0; }
    /* Baris meta (Harga per tabung/TDL/watt/dll) makin banyak sejak kartu
       Gas & Listrik dilengkapi detail penuh - area ini scroll internal
       sendiri kalau kepanjangan, TIDAK memicu scroll halaman/panel (itu
       tetap terkunci via fitDesktopDashboardToViewport_). gas-card-result
       (sel highlight nominal utama) tetap flex-shrink:0 supaya SELALU
       kelihatan di bawah tanpa perlu discroll. */
    .mb-desktop-card .meta-rows-scroll { flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; min-height: 0; scrollbar-width: thin; }
    .mb-desktop-card .meta-row { padding: 1.5px 0; font-size: 10.5px; }
    .mb-desktop-card .gas-card-result { margin-top: 5px; padding-top: 5px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; }
    .mb-desktop-card .gas-result-cell { padding: 6px 8px; }
    .mb-desktop-card .gas-result-cell .label { font-size: 9.5px; line-height: 1.25; }
    .mb-desktop-card .gas-result-cell.highlight .val { font-size: 14px; display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
    .mb-desktop-card .gas-result-cell.highlight .unit { font-size: 9px; }
    .mb-desktop-card .gas-result-grid { margin-bottom: 4px; gap: 4px; }
    .mb-desktop-card .gas-result-grid:last-child { margin-bottom: 0; }
    .mb-desktop-more-note { font-size: 9.5px; color: var(--text-faint); margin-top: 3px; flex-shrink: 0; }

    /* Titik warna kategori - pengganti .flame-dot yang khusus Gas, di sini
       digeneralisasi per tone lewat variabel --dot-color pada wrapper. */
    .mb-desktop-card .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--dot-color, var(--text-faint)); }
    .mb-desktop-card.tone-flame { --dot-color: var(--flame); }
    .mb-desktop-card.tone-volt { --dot-color: var(--volt); }
    .mb-desktop-card.tone-sage { --dot-color: var(--sage); }
    .mb-desktop-card.tone-indigo { --dot-color: var(--indigo); }
    .mb-desktop-card.tone-clay { --dot-color: var(--clay); }
    .mb-desktop-card.tone-brass { --dot-color: var(--brass); }

    /* .gas-result-cell.highlight bawaan sudah berwarna flame (dipakai apa
       adanya utk kartu Gas) - kategori lain dapat varian warna sendiri
       lewat token *-dim yang sudah ada, TIDAK membuat warna baru. */
    .mb-desktop-card.tone-volt .gas-result-cell.highlight { background: rgba(217, 194, 75, 0.16); border: 1px solid rgba(217, 194, 75, 0.4); }
    .mb-desktop-card.tone-volt .gas-result-cell.highlight .val { color: var(--volt-dim); }
    .mb-desktop-card.tone-sage .gas-result-cell.highlight { background: var(--sage-dim); border: 1px solid rgba(15, 118, 110, 0.35); }
    .mb-desktop-card.tone-sage .gas-result-cell.highlight .val { color: var(--sage); }
    .mb-desktop-card.tone-indigo .gas-result-cell.highlight { background: var(--indigo-dim); border: 1px solid rgba(79, 70, 229, 0.35); }
    .mb-desktop-card.tone-indigo .gas-result-cell.highlight .val { color: var(--indigo); }
    .mb-desktop-card.tone-clay .gas-result-cell.highlight { background: var(--clay-dim); border: 1px solid rgba(163, 118, 92, 0.35); }
    .mb-desktop-card.tone-clay .gas-result-cell.highlight .val { color: var(--clay); }
    .mb-desktop-card.tone-brass .gas-result-cell.highlight { background: var(--brass-dim); border: 1px solid rgba(183, 121, 31, 0.35); }
    .mb-desktop-card.tone-brass .gas-result-cell.highlight .val { color: var(--brass); }

    .mb-desktop-empty-val { color: var(--text-faint); font-style: italic; font-weight: 500; font-size: 13px; }
  }
</style>
