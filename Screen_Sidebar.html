<!--
===============================================================================
FILE: Screen_Sidebar.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Sidebar navigasi - KHUSUS DESKTOP (>=1100px), tidak tampil di HP sama sekali.

FUNGSI:
Menu tetap di sisi kiri, alternatif cara masuk ke 6 bagian aplikasi yang
sama persis dengan card Dashboard (Profil Outlet/Master Biaya/Struktur HPP/
Harga Layanan/Biaya Tetap) - tidak membuat layar baru, cuma pintu masuk baru
yang manggil fungsi open...() yang sudah ada.

Ditaruh DILUAR #appRoot (sejajar .wrap di Index.html) supaya bisa fixed
position penuh dari atas ke bawah viewport, terlepas dari lebar .wrap yang
berubah-ubah per layar.

Di-include dari Index.html. Jangan tambah tag <script>/<style> di file ini.
===============================================================================
-->
