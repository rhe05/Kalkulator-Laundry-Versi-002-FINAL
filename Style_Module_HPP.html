<!--
===============================================================================
FILE: Style_Module_HPP.html
PROJECT: Kalkulator Laundry Versi 002
TAHAP: 3 — Pecah CSS Per Fitur

FUNGSI FILE:
Style khusus untuk fitur Struktur Biaya HPP.

ISI UTAMA:
1. Header Struktur Biaya HPP
2. Warning box HPP
3. Card layanan HPP
4. Rincian komponen HPP
5. Progress bar komponen
6. Loading state HPP

BATAS TANGGUNG JAWAB:
- File ini hanya berisi CSS fitur Struktur Biaya HPP.
- Tidak boleh berisi CSS global.
- Tidak boleh berisi HTML screen.
- Tidak boleh berisi JavaScript.
- Jangan mengubah nama class, warna, atau layout tanpa instruksi khusus.

TERHUBUNG DENGAN:
- Index.html
- Screen_HPP.html pada tahap berikutnya
- Script_Module_HPP.html pada tahap berikutnya

CATATAN PENGEMBANGAN:
Jika tampilan rincian HPP, persen komponen, atau total HPP bermasalah, cek file ini terlebih dahulu.
===============================================================================
-->
<style>
/* ---------------------------------------------------------------------- */
/* STRUKTUR BIAYA HPP                                                     */
/* ---------------------------------------------------------------------- */

.hpp-structure-head {
  margin-bottom: 16px;
}

.hpp-structure-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}

.hpp-structure-desc {
  font-size: 12.5px;
  color: var(--text-faint);
  line-height: 1.5;
}

.hpp-warning-box {
  background: rgba(217, 162, 75, 0.08);
  border: 1px solid var(--brass-dim);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 14px;
}

.hpp-warning-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--brass);
  margin-bottom: 8px;
}

.hpp-warning-box ul {
  padding-left: 18px;
}

.hpp-warning-box li {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 4px;
}

.hpp-service-card {
  background: linear-gradient(165deg, var(--panel) 0%, var(--panel-2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 14px;
  overflow: hidden;
}

.hpp-service-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
}

.hpp-service-name {
  font-family: var(--font-display);
  font-size: 15.5px;
  font-weight: 700;
}

.hpp-service-unit {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-faint);
  margin-top: 4px;
}

.hpp-service-total {
  text-align: right;
  flex-shrink: 0;
}

.hpp-total-label {
  font-size: 10.5px;
  color: var(--text-faint);
  margin-bottom: 4px;
}

.hpp-total-value {
  font-family: var(--font-display);
  font-size: 21px;
  line-height: 1.1;
  font-weight: 800;
  color: var(--sage);
}

.hpp-component-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.hpp-component-row {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius);
  padding: 10px 11px;
}

.hpp-component-line {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
  align-items: baseline;
  margin-bottom: 7px;
}

.hpp-component-name {
  font-size: 12.5px;
  color: var(--text-dim);
  min-width: 0;
}

.hpp-component-amount {
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--text);
  font-weight: 700;
  white-space: nowrap;
}

.hpp-component-percent {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass);
  white-space: nowrap;
}

.hpp-progress {
  height: 5px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}

.hpp-progress-fill {
  height: 100%;
  background: var(--sage);
  border-radius: 999px;
}

.hpp-component-note {
  font-size: 10.8px;
  color: var(--text-faint);
  margin-top: 6px;
  line-height: 1.4;
}

.hpp-loading {
  text-align: center;
  color: var(--text-faint);
  font-size: 13px;
  padding: 30px 12px;
}

/* === DESKTOP LAYOUT (>=1100px) - screenStrukturHPPList & screenStrukturHPPDetail ===
   .wrap dilebarkan khusus 2 screen ini (pola sama spt Profil Outlet/Master
   Biaya) - AMAN tanpa @media krn width:min(100%,1080px) otomatis balik ke
   100% sendiri di HP. Rule display/grid TETAP di dalam @media supaya HP
   tidak berubah sama sekali. */
body:has(#screenStrukturHPPList.active) .wrap,
body:has(#screenStrukturHPPDetail.active) .wrap { width: min(100%, 1080px); }

@media (min-width: 1100px) {
  /* Daftar outlet jadi grid 2 kolom, bukan ditumpuk 1 kolom panjang. */
  #strukturHPPOutletList { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

  /* Card per layanan (HPP Cuci Saja/Kering Saja/dst) dipakai masonry 2
     kolom (spt Dashboard) supaya tidak 1 kolom panjang ke bawah - header
     ringkasan outlet & kotak peringatan tetap selebar penuh di atasnya. */
  #strukturHPPContent { columns: 2; column-gap: 16px; }
  #strukturHPPContent .summary-hero,
  #strukturHPPContent .hpp-warning-box { column-span: all; }
  #strukturHPPContent .hpp-service-card { break-inside: avoid; }
}

/* === DASHBOARD HPP CARD === */
.hpp-mini-list { display: flex; flex-direction: column; gap: 10px; }
.hpp-mini-card {
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--panel-2);
  overflow: hidden;
}
.hpp-mini-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  cursor: pointer;
}
.hpp-mini-title {
  flex: 1;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
}
.hpp-mini-total {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.hpp-mini-arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--panel);
  border: 1px solid var(--border);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dim);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.hpp-mini-card.is-open .hpp-mini-arrow {
  transform: rotate(180deg);
}
.hpp-mini-detail {
  display: none;
  flex-direction: column;
  gap: 6px;
  padding: 8px 12px 10px 12px;
  border-top: 1px solid var(--border);
}
.hpp-mini-card.is-open .hpp-mini-detail {
  display: flex;
}
.hpp-bedcover-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 4px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  font-size: 10.5px;
  color: var(--text-dim);
}
.hpp-bedcover-toggle-btn {
  flex-shrink: 0;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-dim);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 4px 10px;
  cursor: pointer;
}
.hpp-bedcover-toggle-btn:hover {
  border-color: var(--sage-dim);
}
.hpp-bedcover-off-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 4px;
  padding: 8px 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  font-size: 11px;
  color: var(--text-faint);
}
.hpp-mini-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10.5px;
}
.hpp-mini-row-label {
  flex: 1;
  color: var(--text-dim);
  font-weight: 600;
}
.hpp-mini-row-percent {
  color: var(--text-faint);
  width: 44px;
  flex-shrink: 0;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.hpp-mini-row-amount {
  color: var(--text);
  font-weight: 600;
  width: 62px;
  flex-shrink: 0;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ====================================================================
   LAYAR STRUKTUR BIAYA HPP (#screenStrukturHPPList) - KHUSUS DESKTOP
   (>=1100px). Konsep sama dgn Dashboard/Profil Outlet/Master Biaya: satu
   panel utk outlet terpilih, brand "Kalkulator Laundry" + tombol Back
   dibuang, cukup 1 layar. Kartu layanan REUSE ".hpp-mini-card" (collapsible,
   "Progressive Disclosure") - komponen yang SUDAH ADA & dipakai Dashboard,
   bukan bahasa visual baru (standar Hyper-Premium FinTech, KONTEKS_
   PROYEK.md). HP/tablet (<1100px) TIDAK PERNAH masuk media query ini ->
   tetap daftar outlet lama (.strukturhpp-mobile-only), tidak berubah.
   ==================================================================== */
.strukturhpp-desktop { display: none; }

@media (min-width: 1100px) {
  #screenStrukturHPPList .strukturhpp-mobile-only { display: none; }
  #screenStrukturHPPList .strukturhpp-desktop { display: flex; flex-direction: column; gap: 10px; }

  body:has(#screenStrukturHPPList.active) .app-header { display: none !important; }
  body:has(#screenStrukturHPPList.active) { padding-top: 4px; }
  body:has(#screenStrukturHPPList.active) .wrap { width: min(100%, 1280px); }

  #screenStrukturHPPList .dashboard-header {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 18px;
    margin-bottom: 0;
    box-shadow: 0 1px 2px rgba(17,24,39,0.03);
    flex-shrink: 0;
  }
  #screenStrukturHPPList .dashboard-header-top { align-items: center; }
  #screenStrukturHPPList .dashboard-title { font-size: 16px; margin-bottom: 0; letter-spacing: -0.01em; }
  #screenStrukturHPPList .dashboard-eyebrow { margin-bottom: 2px; }

  body:has(#screenStrukturHPPList.active) .outlet-filter-pill { max-width: none; }
  body:has(#screenStrukturHPPList.active) .outlet-kategori-badge {
    display: inline-flex; align-items: center; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--brass);
    background: rgba(var(--brass-rgb, 180, 130, 60), 0.10);
    border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.22);
    border-radius: 999px; padding: 2px 8px; margin: 0 2px; white-space: nowrap; flex-shrink: 0;
  }

  /* Tinggi panel ini DIKUNCI via JS (fitDesktopDashboardToViewport_ di
     Script_Fitur_Dashboard.html, teknik SAMA dgn 3 layar lain) - panel &
     header TETAP tidak bisa discroll. [2026-07-13] Kartu HPP di panel ini
     SELALU terbuka (bukan collapsed spt semula), jadi kontennya bisa lebih
     tinggi dari panel - HANYA .hpp-desktop-scroll di dalamnya yang boleh
     discroll, panel & header tetap diam. */
  #screenStrukturHPPList .strukturhpp-desktop-panel { padding: 18px 20px; display: flex; flex-direction: column; overflow: hidden; }
  #strukturHPPDesktopContent { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
  #strukturHPPDesktopContent .hpp-desktop-scroll { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; }

  /* Kartu layanan (.hpp-mini-card) dijejer grid multi-kolom (bukan
     ditumpuk 1 kolom spt di kartu Dashboard yang sempit). Scoped ke panel
     desktop ini saja - kartu HPP di Dashboard (.dashboard-card-summary)
     tetap 1 kolom & collapsible, tidak berubah. */
  #strukturHPPDesktopContent .hpp-mini-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    grid-auto-rows: min-content;
    align-content: start;
    gap: 10px;
  }
  #strukturHPPDesktopContent .hpp-mini-title { font-size: 12px; }
  #strukturHPPDesktopContent .hpp-mini-total { font-size: 16px; }
}
</style>
