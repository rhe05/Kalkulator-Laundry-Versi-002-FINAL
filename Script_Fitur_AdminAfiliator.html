<!--
===============================================================================
FILE: Script_Fitur_AdminAfiliator.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Fitur Admin - Kelola Akun (screenAdminAfiliator)

FUNGSI:
1. refreshAdminAccountsList_/renderAdminAccountsList_: ambil & render daftar
   semua akun (adminListAccounts, Modul_Auth.gs) via cachedServerRead_, isi
   juga kartu ringkasan (Total Aktif/Online Sekarang). Daftar detail
   collapsed default (toggleAdminAccountsDetail) - Progressive Disclosure,
   baru muncul setelah kartu ringkasan diklik.
2. openConfirmDeleteAccount/confirmDeleteAccountNow: hapus akun permanen
   (adminDeleteAccount) - reuse #confirmOverlay bersama (sama seperti hapus
   item Chemical/Packing/dst, lihat Script_Fitur_Cabang.html utk closeConfirm).
3. adminSendPasswordReset: [2026-07-22] admin kirim link reset password ke
   user yang lupa password - SENGAJA TIDAK ADA fitur lihat password (password
   di-hash satu-arah, tidak mungkin & tidak boleh dibalik ke bentuk asli).
   Reuse alur publik requestPasswordReset + authFirebaseSendMagicLink_ yang
   sama persis dgn "Lupa Password" biasa (Script_Fitur_Auth.html) - admin
   cuma memicu, TIDAK PERNAH melihat/menyimpan password.
4. submitAdminCreateInvite: [2026-07-22] "Undang Akun Baru" - admin isi 1
   email, backend adminCreateInvite (Modul_Auth.gs) kirim email berisi link
   "Aktifkan Akun" terkunci ke email itu. SATU-SATUNYA langkah manual dalam
   seluruh alur - sisanya (customer klik link, pilih password, akun aktif)
   otomatis penuh tanpa admin terlibat lagi. Sistem mandiri, TIDAK
   terintegrasi ke platform pembayaran/pihak ketiga mana pun (lihat catatan
   riwayat di Modul_Auth.gs kenapa webhook Lynk.id dibongkar).
Backend yang menegakkan "hanya admin boleh" (cek session.email) - kartu menu
& layar ini di client cuma disembunyikan utk user lain (authApplyAdminUI_,
Script_Fitur_Auth.html), BUKAN satu-satunya lapisan keamanan.

[2026-07-22] Fitur "Kode Akses" (generate kode trial/billing) DIHAPUS TOTAL -
tidak berfungsi/tidak dipakai, semua akun sekarang akses penuh tanpa gerbang
kode apa pun.

Include SEBELUM Script_Boot_Main.html.
===============================================================================
-->
<script>
"use strict";
  var adminAccountsDetailOpen_ = false;

  window.openScreenAdminAfiliator = function () {
    var inviteErrEl = document.getElementById("adminInviteError");
    if (inviteErrEl) inviteErrEl.style.display = "none";

    adminAccountsDetailOpen_ = false;
    var section = document.getElementById("adminAccountsSection");
    var arrow = document.getElementById("adminSummaryArrow");
    if (section) section.style.display = "none";
    if (arrow) arrow.style.transform = "";

    showScreen("adminAfiliator");
    refreshAdminAccountsList_();
  };

  window.toggleAdminAccountsDetail = function () {
    adminAccountsDetailOpen_ = !adminAccountsDetailOpen_;
    var section = document.getElementById("adminAccountsSection");
    var arrow = document.getElementById("adminSummaryArrow");
    if (section) section.style.display = adminAccountsDetailOpen_ ? "" : "none";
    if (arrow) arrow.style.transform = adminAccountsDetailOpen_ ? "rotate(180deg)" : "";
  };

  function adminFormatDate_(value) {
    if (!value) return "-";
    var d = new Date(isNaN(Number(value)) ? value : Number(value));
    if (isNaN(d.getTime())) return "-";
    var dd = String(d.getDate()).padStart(2, "0");
    var mm = String(d.getMonth() + 1).padStart(2, "0");
    return dd + "/" + mm + "/" + d.getFullYear();
  }

  // ---- Daftar Akun ------------------------------------------------------

  function renderAdminAccountsList_(accounts) {
    var listEl = document.getElementById("adminAccountsList");
    var emptyEl = document.getElementById("adminAccountsEmpty");
    var countEl = document.getElementById("adminAccountsCount");
    if (!listEl) return;

    if (countEl) countEl.textContent = accounts.length + " akun";
    if (!accounts.length) {
      listEl.innerHTML = "";
      if (emptyEl) emptyEl.style.display = "block";
      return;
    }
    if (emptyEl) emptyEl.style.display = "none";

    listEl.innerHTML = accounts.map(function (acc) {
      var dotColor = acc.pending ? "var(--volt)" : "var(--sage)";

      var cells = "";
      cells += '<div class="gas-result-cell"><div class="label">Status</div><div class="val" style="font-size:13px;">' + escapeHtml(acc.status) + (acc.online ? " &middot; Online" : "") + '</div></div>';
      cells += '<div class="gas-result-cell"><div class="label">Terdaftar</div><div class="val" style="font-size:13px;">' + escapeHtml(adminFormatDate_(acc.createdAt)) + '</div></div>';

      // [2026-07-22] Akun pending (belum klik link verifikasi) tetap dapat
      // tombol Hapus - buat bersihkan pendaftaran yang macet/link
      // kedaluwarsa (lihat adminDeleteAccount, Modul_Auth.gs, sekarang
      // menerima akun yang cuma punya authOtp_ tanpa authUser_). Tombol
      // kirim-reset TIDAK relevan utk akun pending (belum ada akun aktif
      // yang bisa direset passwordnya).
      var actions = '<div class="actions">' +
        (acc.pending ? "" : '<button class="icon-btn" type="button" aria-label="Kirim link reset password" title="Kirim link reset password" onclick="adminSendPasswordReset(\'' + escapeJsAttr(acc.email) + '\', this); event.stopPropagation();">&#128231;</button>') +
        '<button class="icon-btn" type="button" aria-label="Hapus akun" onclick="openConfirmDeleteAccount(\'' + escapeJsAttr(acc.email) + '\'); event.stopPropagation();">&#10005;</button>' +
      '</div>';

      // [2026-07-14] SENGAJA tidak ada tombol aksi admin di sini utk akun yang
      // belum tersambung - provisioning HARUS dipicu oleh akun itu sendiri
      // saat login (lihat loginUser self-heal, Modul_Auth.gs), krn executeAs:
      // USER_ACCESSING bikin spreadsheet yang dibuat ADMIN malah kepemilikan
      // Drive admin & tidak bisa dibuka user itu. Cukup minta user coba login
      // ulang - otomatis membetulkan diri sendiri.
      if (!acc.pending && !acc.hasTenant) {
        cells += '<div class="gas-result-cell"><div class="label">Data</div><div class="val" style="font-size:13px; color:var(--red);">Belum tersambung - minta user coba login ulang</div></div>';
      }

      return '' +
        '<div class="gas-card">' +
          '<div class="gas-card-top">' +
            '<div class="title-group">' +
              '<span class="flame-dot" style="background:' + dotColor + ';"></span>' +
              '<h3 style="font-size:13px; word-break:break-all;">' + escapeHtml(acc.email) + '</h3>' +
            '</div>' +
            actions +
          '</div>' +
          '<div class="gas-card-result"><div class="gas-result-grid">' + cells + '</div></div>' +
        '</div>';
    }).join("");
  }

  function refreshAdminAccountsList_() {
    cachedServerRead_("adminListAccounts", undefined, function (res) {
      if (!res || !res.ok) return;
      renderAdminAccountsList_(res.data.accounts || []);
      var totalAktifEl = document.getElementById("adminStatTotalAktif");
      var onlineEl = document.getElementById("adminStatOnline");
      if (totalAktifEl) totalAktifEl.textContent = String(res.data.totalAktif || 0);
      if (onlineEl) onlineEl.textContent = String(res.data.totalOnline || 0);
    }, function () {});
  }

  /**
   * adminSendPasswordReset: admin bantu user yang lupa password TANPA
   * pernah tahu password lama/barunya - reuse alur "Lupa Password" publik
   * (requestPasswordReset, Modul_Auth.gs) lalu kirim magic link-nya lewat
   * Firebase (authFirebaseSendMagicLink_, Script_Fitur_FirebaseAuth.html).
   * User yang klik link itu sendiri yang set password baru (authScreenResetPassword)
   * - admin sama sekali tidak terlibat di langkah itu.
   */
  window.adminSendPasswordReset = function (email, btn) {
    if (btn) { btn.disabled = true; }
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) {
          if (btn) { btn.disabled = false; }
          if (typeof showToast === "function") showToast((res && res.error) || "Gagal memproses permintaan.", "error");
          return;
        }
        authFirebaseSendMagicLink_(email, "resetPassword").then(function () {
          if (btn) { btn.disabled = false; }
          if (typeof showToast === "function") showToast("Link reset password terkirim ke " + email + ".", "ok");
        }).catch(function (err) {
          if (btn) { btn.disabled = false; }
          if (typeof showToast === "function") showToast(authMapFirebaseError_(err), "error");
        });
      })
      .withFailureHandler(function (err) {
        if (btn) { btn.disabled = false; }
        if (typeof showToast === "function") showToast(err && err.message ? err.message : String(err), "error");
      })
      .requestPasswordReset(email);
  };

  /**
   * submitAdminCreateInvite: SATU-SATUNYA langkah manual admin dlm alur
   * "Undang Akun Baru" - panggil adminCreateInvite (Modul_Auth.gs, sudah
   * kirim email di server lewat MailApp), sisanya customer yang lanjutkan
   * sendiri (klik link, pilih password).
   */
  window.submitAdminCreateInvite = function () {
    var emailEl = document.getElementById("adminInviteEmail");
    var btn = document.getElementById("adminInviteBtn");
    var errEl = document.getElementById("adminInviteError");
    var email = emailEl ? emailEl.value.trim() : "";
    if (errEl) errEl.style.display = "none";

    if (!email) {
      if (errEl) { errEl.textContent = "Email wajib diisi."; errEl.style.display = "block"; }
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = "Mengirim..."; }
    callServer_("adminCreateInvite", [email], function (res) {
      if (btn) { btn.disabled = false; btn.textContent = "Kirim Undangan"; }
      if (!res || !res.ok) {
        if (errEl) { errEl.textContent = (res && res.error) || "Gagal mengirim undangan."; errEl.style.display = "block"; }
        return;
      }
      if (emailEl) emailEl.value = "";
      if (typeof showToast === "function") showToast("Undangan terkirim ke " + res.data.email + ".", "ok");
    }, function (err) {
      if (btn) { btn.disabled = false; btn.textContent = "Kirim Undangan"; }
      if (errEl) { errEl.textContent = err && err.message ? err.message : String(err); errEl.style.display = "block"; }
    });
  };

  window.openConfirmDeleteAccount = function (email) {
    document.getElementById("confirmTitle").textContent = "Hapus akun ini?";
    document.getElementById("confirmText").textContent =
      "Akun \"" + email + "\" beserta SELURUH data laundry-nya akan dihapus permanen (spreadsheet data dipindah ke Trash Drive). Email ini bisa daftar ulang dari nol kalau diperlukan lagi.";
    document.getElementById("confirmOverlay").classList.add("show");

    var btn = document.getElementById("confirmDeleteBtn");
    btn.onclick = function () { confirmDeleteAccountNow(email); };
  };

  function confirmDeleteAccountNow(email) {
    var btn = document.getElementById("confirmDeleteBtn");
    btn.disabled = true;
    btn.textContent = "Menghapus...";

    callServer_("adminDeleteAccount", [email], function (res) {
      btn.disabled = false;
      btn.textContent = "Hapus";
      closeConfirm();
      if (!res || !res.ok) {
        if (typeof showToast === "function") showToast((res && res.error) || "Gagal menghapus akun.", "error");
        return;
      }
      if (typeof invalidateServerReadCache_ === "function") invalidateServerReadCache_("adminListAccounts");
      refreshAdminAccountsList_();
      if (typeof showToast === "function") showToast("Akun dihapus.", "ok");
    }, function (err) {
      btn.disabled = false;
      btn.textContent = "Hapus";
      closeConfirm();
      if (typeof showToast === "function") showToast(err && err.message ? err.message : String(err), "error");
    });
  }
</script>
