<!--
===============================================================================
FILE: Style_Components.html
PROJECT: Kalkulator Laundry Versi 002
STATUS: Dipecah ulang 2026-07-09 -- semua style khusus Dashboard sudah
        dipindah ke Style_Module_Dashboard.html. File ini sekarang BENAR-BENAR
        hanya berisi komponen reusable lintas fitur (sesuai aturan yang sudah
        lama tertulis di sini tapi belum ditegakkan).

FUNGSI FILE:
Style komponen umum yang dipakai lintas layar/fitur (BUKAN Dashboard).

ISI UTAMA:
1. Kartu cabang (daftar cabang) -- .cabang-card, .meta-row, .mini-stat
2. Panel & field form -- .panel, .field, input helper (chemical/packing/gas)
3. Time picker, machine list/row (form Cabang)
4. Button -- .btn-primary/.btn-secondary/.btn-danger, .add-btn, .icon-btn
5. Pill/tab -- .pill-group, .pill
6. Summary/ringkasan detail -- .summary-hero, .stat-grid, .scale-table,
   .machine-summary-row
7. Toast notifikasi -- .toast
8. Modal konfirmasi -- .confirm-overlay, .confirm-box
9. Outlet picker modal -- .outlet-picker-box/list/item
10. Skeleton loading -- .skeleton-line

BATAS TANGGUNG JAWAB:
- Hanya berisi komponen reusable lintas fitur.
- TIDAK BOLEH berisi style khusus Dashboard (lihat Style_Module_Dashboard.html),
  Master Biaya, HPP, Fixed Cost, atau Harga Layanan punya modul sendiri.
- Tidak boleh berisi logic JavaScript.
- Tidak boleh berisi HTML screen.

TERHUBUNG DENGAN:
Dipakai hampir semua Screen_*.html (Cabang, MasterBiaya, BiayaGas/Chemical/
Packing/Listrik/Air/NotaKasir, StrukturHPP, HargaLayanan, BiayaTetapOutlet).

CATATAN PENGEMBANGAN:
Jika membuat fitur baru, pakai class komponen umum dari file ini terlebih
dahulu. Tambahkan style module baru (Style_Module_Xxx.html) hanya jika
komponen umum tidak cukup -- JANGAN tambah style khusus satu fitur ke file
ini lagi (itu penyebab file ini sempat kemasukan style Dashboard).
===============================================================================
-->
