<!--
===============================================================================
FILE: Style_Module_Dashboard.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Style khusus layar Dashboard/Menu Utama (screenMenu)

FUNGSI:
Semua style kartu ringkasan Dashboard: menu-grid, dashboard-header, outlet
filter pill, profil-outlet-card (kartu Cabang), bep-card, mb-* (kartu Master
Biaya), dashboard-kpi/outlet-list (kartu Cabang detail), footer-bar, hl-*
(kartu Harga Layanan versi ringkas di dashboard), fc-* (kartu Fixed Cost versi
ringkas di dashboard), plus perbaikan overflow mobile khusus dashboard.

CATATAN PENTING:
hl-* dan fc-* di sini BUKAN duplikat Style_Module_HargaLayanan.html /
Style_Module_FixedCost.html -- itu style untuk LAYAR DETAIL PENUH,
sedangkan file ini untuk KARTU RINGKAS di Dashboard (render-nya di
Script_Fitur_Dashboard.html, fungsi renderDashboardHargaLayananCard /
renderDashboardFixedCostCard). Class name sengaja sama karena konteksnya
terkait, tapi elemen DOM & scope-nya beda (dashboard card vs layar detail).

Dipisah dari Style_Components.html 2026-07-09 karena komentar header file
itu sendiri sudah lama menyatakan TIDAK BOLEH berisi style khusus
Master Biaya/HPP/FixedCost/HargaLayanan, tapi isinya sudah kemasukan itu semua.
===============================================================================
-->
<style>
/* MENU UTAMA (gerbang sebelum daftar cabang / Master Biaya)              */
  /* ---------------------------------------------------------------------- */
  .menu-grid { display: flex; flex-direction: column; gap: 12px; }

  /* HP/tablet portrait (<1100px): 7 card ringkasan (.dashboard-grid) apa
     adanya, TIDAK DIUBAH SAMA SEKALI. Ringkasan eksekutif desktop
     (.desktop-dashboard-summary) disembunyikan total di lebar ini. */
  .desktop-dashboard-summary { display: none; }

  /* Dashboard di layar lebar (tablet lanskap/laptop/PC, >=1100px sama
     dengan breakpoint 2-kolom form Profil Outlet): .dashboard-grid (7 card
     versi HP) diganti tampilannya dgn ringkasan eksekutif 1 halaman (5 KPI
     + grafik BEP + Master Biaya berdampingan + Harga Layanan) - Profil
     Outlet & Struktur HPP tetap ada, dibuka lewat sidebar (lihat
     Screen_Sidebar.html), bukan di halaman ringkasan ini lagi. */
  body:has(#screenMenu.active) .wrap { width: min(100%, 1600px); }

  @media (min-width: 1100px) {
    #screenMenu .dashboard-grid { display: none; }

    /* Header app ("Kalkulator Laundry" + icon) sudah ada duplikatnya di
       sidebar (Screen_Sidebar.html) - di Dashboard header ini dibuang total
       supaya konten naik ke atas (tidak ada baris kosong sisa) & tidak
       ada branding dobel. DIBATASI ke #screenMenu.active saja - layar lain
       (Profil Outlet, Master Biaya, dst) TETAP pakai header spt biasa krn
       masih butuh tombol Kembali. HP tidak pernah masuk media query ini. */
    body:has(#screenMenu.active) .app-header { display: none !important; }

    /* === PAKSA 1 LAYAR PENUH TANPA SCROLL (khusus Dashboard desktop) ===
       Percobaan sebelumnya pakai rantai CSS murni (html/body/.wrap/#appRoot
       height:100vh + overflow:hidden berantai) TERBUKTI RAPUH - ada aturan
       spec CSS "overflow propagation" yang bikin body:overflow:hidden saja
       tidak selalu menghentikan scroll viewport begitu html sudah punya
       overflow-x sendiri (lihat Style_Base.html), plus konteks Apps Script
       kadang beda perilaku. Diganti total: tinggi panel ini sekarang
       DIUKUR & DIKUNCI langsung via JavaScript (fitDesktopDashboardToViewport_
       di Script_Fitur_Dashboard.html, dipanggil tiap ganti layar & resize)
       pakai window.innerHeight yang selalu akurat - jauh lebih pasti drpd
       vh/overflow CSS. CSS di sini cuma menyiapkan strukturnya: topbar &
       baris KPI tetap tinggi natural (flex-shrink:0), baris BEP+Master
       Biaya jadi elemen elastis (flex:1) yg menyesuaikan ke sisa ruang
       DALAM tinggi yang sudah dikunci JS tsb. */
    .desktop-dashboard-summary { display: flex; flex-direction: column; gap: 14px; overflow: hidden; }
    .desktop-kpi-row { flex-shrink: 0; }
    .desktop-summary-row { flex: 1; min-height: 340px; }
    .desktop-summary-full { flex-shrink: 0; }

    /* Topbar tipis khusus desktop: header dashboard jadi strip putih (var
       --panel) presisi dgn border halus - spt topbar Stripe/Linear/Vercel -
       bukan blok judul besar vertikal spt versi HP. Subjudul "Ringkasan
       kondisi outlet Anda saat ini" dihapus di sini krn sudah cukup jelas
       dari konteks topbar. Padding/margin dikecilkan lagi supaya konten
       naik lebih tinggi. #screenMenu discope supaya HP (.dashboard-header
       tetap dipakai bareng, tapi HP selalu <1100px) tidak ikut berubah. */
    #screenMenu .dashboard-header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03);
    }
    #screenMenu .dashboard-header-top { align-items: center; }
    #screenMenu .dashboard-eyebrow { display: none; }
    #screenMenu .dashboard-title { font-size: 16px; margin-bottom: 0; letter-spacing: -0.01em; }
    #screenMenu .dashboard-subtitle { display: none; }

    /* Hero KPI row: card lebih tinggi & lega (bukan 5 card datar spt
       sebelumnya) - label jadi info sekunder kecil, angka jadi fokus utama
       dgn hierarki 2 baris (prefix "Rp" kecil di atas, angka besar di
       bawah) utk KPI berbasis Rupiah - lihat setDesktopKpiMoney_ di
       Script_Fitur_Dashboard.html. Kartu ringkas HP (.dashboard-kpi) TIDAK
       memakai class desktop-kpi-* sama sekali jadi tidak ikut berubah. */
    .desktop-kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
    .desktop-kpi-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 26px 22px 24px;
      min-width: 0;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03), 0 10px 24px -12px rgba(17,24,39,0.12);
    }
    .desktop-kpi-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-faint);
      margin-bottom: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .desktop-kpi-value {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .desktop-kpi-currency {
      font-family: var(--font-body);
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-faint);
      letter-spacing: 0.02em;
    }
    .desktop-kpi-number {
      font-family: var(--font-display);
      /* clamp, bukan angka tetap 30px - supaya angka 7 digit (mis.
         "7.065.000") TIDAK terpotong "..." di jendela browser yang tidak
         selebar 1600px penuh (mis. laptop/window kecil) - ukuran ikut
         menyesuaikan lebar kartu, tetap besar & presisi di layar lebar. */
      font-size: clamp(18px, 1.5vw, 27px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.08;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .desktop-kpi-number-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
    }
    .desktop-kpi-unit {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .kpi-omset .desktop-kpi-number { color: var(--sage); }
    .kpi-bep-load .desktop-kpi-number,
    .kpi-bep-omset .desktop-kpi-number { color: var(--brass); }
    .kpi-fixed-cost .desktop-kpi-number { color: var(--text-dim); }
    .desktop-kpi-value.pos .desktop-kpi-number { color: var(--sage); }
    .desktop-kpi-value.neg .desktop-kpi-number { color: var(--red); }

    /* Grafik BEP dilebarkan lagi (2.4fr), Master Biaya dikecilkan lagi (0.9fr).
       align-items diganti dari "start" ke "stretch" supaya panel BEP & Master
       Biaya SELALU sama tinggi (diminta user), tidak lagi ikut tinggi konten
       masing-masing. Kedua panel dijadikan flex column supaya body-nya
       (#desktopBepChart / #desktopMasterBiaya) bisa flex:1 mengisi penuh
       tinggi panel - dasar dari pola "paksa 1 layar" di bawah. */
    .desktop-summary-row { display: grid; grid-template-columns: 2.4fr 0.9fr; gap: 20px; align-items: stretch; }
    .desktop-summary-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 22px 20px;
      overflow: hidden;
      min-width: 0;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 2px rgba(17,24,39,0.03), 0 10px 24px -12px rgba(17,24,39,0.12);
    }
    /* DIBATASI ke ".desktop-summary-row" saja (panel BEP & Master Biaya) -
       kalau ditulis tanpa scope ini, rule "flex-direction:column" ini
       KEBOCORAN ke panel Harga Layanan (.desktop-summary-full JUGA punya
       class .desktop-summary-panel) & merusak barisnya jadi tersusun ke
       bawah - itu penyebab bug "Harga Layanan lurus ke bawah" sebelumnya. */
    .desktop-summary-row .desktop-summary-panel > .dashboard-card-summary { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .desktop-summary-full { width: 100%; }

    /* === CHART BEP - restyle premium KHUSUS panel desktop (#desktopBepChart) ===
       buildBepChartSvg() di Script_Shared_Util.html dipakai bareng kartu
       ringkas HP (#dashboardBEPSummary) - markup SVG-nya TIDAK diubah (JS
       tetap sama) supaya HP tidak ikut berubah. Semua polesan visual di
       sini murni CSS yang di-scope ke id panel desktop saja: CSS menang
       atas atribut presentasi SVG (stroke-width dll) jadi aman menimpa
       tanpa sentuh JS. */
    #desktopBepChart .bep-chart-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
      border-radius: 12px;
      padding: 14px 14px 10px;
      box-shadow: none;
    }
    #desktopBepChart .bep-chart-svg line { stroke-width: 1.3; }
    #desktopBepChart .bep-chart-svg text { font-family: var(--font-mono); letter-spacing: 0.01em; }
    #desktopBepChart .bep-chart-svg polygon { opacity: 0.92; }
    #desktopBepChart .bep-chart-legend { gap: 22px; margin-top: 10px; flex-shrink: 0; }
    #desktopBepChart .bep-legend-item { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
    #desktopBepChart .bep-legend-dot { width: 7px; height: 7px; }
    /* Grafik BEP di panel desktop: .bep-chart-svg bawaan (dipakai bareng
       kartu ringkas HP) tingginya fixed 120px, dulu dipaksa 300px KHUSUS
       di sini - sekarang diganti flex:1 (elastis, bukan angka tetap)
       supaya otomatis menyesuaikan ke sisa tinggi viewport (bagian dari
       pola "paksa 1 layar" di atas, jadi presisi di layar manapun tanpa
       perlu redesign ulang tiap ukuran layar). preserveAspectRatio="none"
       pada SVG-nya (lihat buildBepChartSvg di Script_Shared_Util.html)
       memang didesain utk skenario tinggi fleksibel spt ini - kartu
       ringkas HP (#dashboardBEPSummary) TIDAK ikut berubah krn scoped ke
       id ini saja. */
    #desktopBepChart .bep-chart-svg { flex: 1; min-height: 0; height: auto; }

    /* === MASTER BIAYA - susunan 2 baris per item + tinggi disamakan dgn
       panel BEP di sebelahnya (via flex:1 dari .desktop-summary-panel di
       atas) KHUSUS panel desktop (#desktopMasterBiaya). .mb-* dipakai
       bareng kartu ringkas HP (#dashboardMasterBiayaSummary) - style
       global .mb-* & markup .mb-komponen-top (1 baris) TIDAK diubah, HP
       tetap pakai versi lama. Baris item di sini pakai class baru
       (.mb-komponen-row-desktop/.mb-komponen-line1/line2, lihat
       Script_Fitur_Dashboard.html) supaya tidak numpang di CSS HP sama
       sekali. */
    #desktopMasterBiaya .mb-card { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    #desktopMasterBiaya .mb-komponen-list {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }
    #desktopMasterBiaya .mb-komponen-row-desktop { display: flex; flex-direction: column; gap: 8px; }
    #desktopMasterBiaya .mb-komponen-line1 { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    #desktopMasterBiaya .mb-komponen-line1 .mb-komponen-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      width: auto;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
    }
    #desktopMasterBiaya .mb-komponen-line1 .mb-komponen-value {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
      width: auto;
      font-variant-numeric: tabular-nums;
    }
    #desktopMasterBiaya .mb-komponen-line2 { display: flex; align-items: center; gap: 8px; }
    #desktopMasterBiaya .mb-komponen-line2 .mb-progress-bar { flex: 1; height: 8px; border-radius: 999px; }
    #desktopMasterBiaya .mb-komponen-line2 .mb-progress-fill { border-radius: 999px; transition: width 0.4s ease; }
    #desktopMasterBiaya .mb-komponen-line2 .mb-komponen-persen { font-size: 11px; width: 36px; flex-shrink: 0; text-align: right; }
    #desktopMasterBiaya .mb-komponen-row-desktop.zero .mb-komponen-line1 { opacity: 0.45; }

    /* Harga Layanan di panel ringkasan desktop: SELALU 1 baris sejajar
       berapa pun jumlah kartunya (flex nowrap, bukan grid auto-fit yang
       bisa pecah ke baris baru) - DIBATASI ke #desktopHargaLayanan saja,
       .hl-item di card ringkas HP (#dashboardHargaLayananSummary) TIDAK
       ikut berubah. */
    #desktopHargaLayanan {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 12px;
      align-items: start;
    }
    #desktopHargaLayanan .hl-item { margin-bottom: 0; flex: 1 1 0; min-width: 0; }
    #desktopHargaLayanan .hl-note { flex-shrink: 0; }

    .desktop-panel-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 14px;
    }
  }
  .menu-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.15s ease;
    text-align: left;
  }
  .menu-card:hover { border-color: var(--sage-dim); }
  .menu-card.is-static { cursor: default; }
  .menu-card.is-static:hover { border-color: var(--border); }
  .menu-card .menu-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .menu-card.tone-sage .menu-icon { background: rgba(111,160,140,0.12); color: var(--sage); }
  .menu-card.tone-flame .menu-icon { background: rgba(217,113,75,0.12); color: var(--flame); }
  .menu-card.tone-volt .menu-icon { background: rgba(217,194,75,0.12); color: var(--volt); }
  .menu-card .menu-body { flex: 1; min-width: 0; }
  .menu-card .menu-title {
    font-family: var(--font-display);
    font-size: 15.5px;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .menu-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .dashboard-card .menu-title {
    font-size: 12.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .menu-title-row .menu-title { margin-bottom: 0; }
  .menu-card .menu-desc { font-size: 12.5px; color: var(--text-faint); line-height: 1.4; }
  .menu-card .menu-arrow { color: var(--text-dim); font-size: 22px; font-weight: 700; flex-shrink: 0; }

  .dashboard-header {
    margin-bottom: 16px;
  }

  .dashboard-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .dashboard-header-text {
    min-width: 0;
    flex: 1;
  }

  .outlet-filter-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 12px;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    max-width: 140px;
    margin-top: 2px;
  }

  .outlet-filter-pill:hover {
    border-color: var(--sage-dim);
  }

  .outlet-filter-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .outlet-filter-arrow {
    flex-shrink: 0;
  }

  /* Badge kategori laundry (mis. "Hybrid") di sebelah nama outlet.
     Default HIDDEN -> di HP tidak muncul sama sekali (tampilan HP tidak
     berubah). Dimunculkan hanya di desktop, lihat @media di bawah. */
  .outlet-kategori-badge { display: none; }

  .outlet-filter-pill.single-outlet {
    cursor: default;
  }

  .outlet-filter-pill.single-outlet:hover {
    border-color: var(--border);
  }

  .outlet-filter-pill.single-outlet .outlet-filter-arrow {
    display: none;
  }

  .dashboard-filter-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    flex-shrink: 0;
    max-width: 140px;
  }

  .outlet-count-label {
    font-size: 9.5px;
    color: var(--text-faint);
    text-align: right;
    opacity: 0.7;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  .dashboard-eyebrow {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 6px;
  }

  .dashboard-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .dashboard-subtitle {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .dashboard-grid .dashboard-card {
    align-items: flex-start;
  }

  .dashboard-card-summary {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.45;
  }

  .dashboard-card-summary.is-loading {
    color: var(--text-faint);
  }

  /* === PROFIL OUTLET CARD PREMIUM === */
  .profil-outlet-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .profil-outlet-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .profil-outlet-kategori {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--brass);
    background: rgba(var(--brass-rgb, 180, 130, 60), 0.08);
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.2);
  }

  .profil-outlet-jam {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }

  .profil-outlet-kpi {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0;
    background: var(--panel-2);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .profil-outlet-kpi.profil-outlet-kpi-solo {
    grid-template-columns: 1fr;
    margin-top: 8px;
  }

  .profil-outlet-kpi.kpi-3col {
    grid-template-columns: 1fr auto 1fr auto 1fr;
    padding: 12px 10px;
  }


  .profil-outlet-kpi.kpi-3col .profil-kpi-divider {
    margin: 0 8px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-label {
    font-size: 9px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-value {
    font-size: 16px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-unit {
    font-size: 9px;
  }

  .profil-outlet-kpi.kpi-3col .profil-kpi-okupansi {
    font-size: 9px;
    flex-wrap: wrap;
  }

  .profil-kpi-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 2px;
  }

  .profil-kpi-label {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }

  .profil-kpi-value {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .profil-kpi-item.cuci .profil-kpi-value {
    color: var(--sage);
  }

  .profil-kpi-item.kering .profil-kpi-value {
    color: var(--brass);
  }

  .profil-kpi-item.setrika .profil-kpi-value {
    color: var(--volt);
  }

  .profil-kpi-unit {
    font-size: 10.5px;
    color: var(--text-faint);
    font-weight: 500;

  /* ====================================================================
     DENSITY COMPACT (2026-07-11): paksa ringkasan desktop muat 1 layar
     penuh (laptop 1366x768) TANPA scroll & TANPA terpotong. Prinsipnya
     kepadatan profesional: padding/gap diperkecil terukur, hierarki
     tetap. Sengaja dikumpulkan jadi SATU blok supaya gampang di-tune
     atau dihapus. Panel tengah berhenti mengecil di 230px (floor)
     supaya grafik tetap terbaca.
     ==================================================================== */
  @media (min-width: 1100px) {
    /* Dashboard desktop dinaikkan: app-header disembunyikan di lebar ini
       (lihat aturan di atas), jadi satu-satunya jarak dari atas layar
       tinggal body padding-top:16px (Style_Base.html). Dipangkas KHUSUS
       saat Dashboard aktif supaya konten mepet ke atas. DIBATASI ke
       body:has(#screenMenu.active) + media query >=1100px -> HP (<1100px)
       & layar lain (Profil Outlet dst, #screenMenu tidak .active) TIDAK
       ikut berubah. Ikut menambah tinggi elastis panel via fit-JS krn
       rect.top jadi lebih kecil. */
    body:has(#screenMenu.active) { padding-top: 4px; }
    .desktop-dashboard-summary { gap: 10px; }
    #screenMenu .dashboard-header { padding: 7px 14px; margin-bottom: 0; }
    .desktop-kpi-row { gap: 12px; }
    .desktop-kpi-card { padding: 13px 16px 12px; }
    .desktop-kpi-label { margin-bottom: 7px; }
    .desktop-kpi-number { font-size: clamp(20px, 1.55vw, 29px); }
    /* "Rp" inline mepet nominal (jarak rapat) - font Rp kecil, angka besar. */
    .desktop-kpi-number-row { gap: 3px; align-items: baseline; }
    .desktop-kpi-currency { font-size: 12.5px; }
    /* Keterangan kecil di bawah nominal tiap KPI (Rugi/Impas/Untung, margin,
       rumus, target BEP dll) - biar orang awam paham. */
    .desktop-kpi-note {
      font-size: 8.5px;
      color: var(--text-faint);
      line-height: 1.4;
      margin-top: 8px;
    }
    .desktop-kpi-note .kpi-note-status { font-weight: 700; color: var(--text-dim); }
    .desktop-kpi-note .kpi-note-sub { display: block; color: var(--text-faint); margin-top: 1px; }
    .desktop-kpi-note.note-untung .kpi-note-status { color: var(--sage); }
    .desktop-kpi-note.note-rugi .kpi-note-status { color: var(--red); }
    .desktop-kpi-note.note-impas .kpi-note-status { color: var(--brass); }
    /* Kategori laundry tampil di desktop: pelebaran pill dibuka (HP tetap
       max-width 140px) supaya nama + badge muat 1 baris. */
    body:has(#screenMenu.active) .outlet-filter-pill { max-width: none; }
    body:has(#screenMenu.active) .outlet-kategori-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--brass);
      background: rgba(var(--brass-rgb, 180, 130, 60), 0.10);
      border: 1px solid rgba(var(--brass-rgb, 180, 130, 60), 0.22);
      border-radius: 999px;
      padding: 2px 8px;
      margin: 0 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .desktop-summary-row { gap: 14px; min-height: 230px; }
    .desktop-summary-panel { padding: 13px 16px 11px; }
    .desktop-panel-title { margin-bottom: 8px; }
    /* Panel BEP desktop: (1) judul "Target Titik Impas (BEP)" dikecilkan &
       garis di bawahnya dinaikkan (font 14->11px, jarak bawah ->0) - sama
       gaya dgn panel Master Biaya biar konsisten & elegan. Judul SIBLING
       dari #desktopBepChart, discope :has(#desktopBepChart) supaya judul
       panel lain tidak ikut. (2) Grafik "penyet" krn viewBox 300x150 +
       preserveAspectRatio="none" diregang di panel yg lebar & pendek -
       diperbaiki dgn memberi SVG tinggi maksimal: padding atas/bawah
       chart-wrap & margin legenda dipangkas supaya .bep-chart-svg (flex:1)
       tumbuh lebih tinggi -> garis lebih tegak/proporsional. Semua discope
       ke panel BEP saja. */
    .desktop-summary-panel:has(#desktopBepChart) .desktop-panel-title { font-size: 11px; margin-bottom: 0; }
    #desktopBepChart .bep-chart-wrap { padding: 6px 12px 2px; position: relative; }
    /* Legenda "Omset / Total Biaya" DIPINDAH masuk ke dalam grafik bagian
       atas (permintaan user): dimunculkan lagi tapi di-overlay absolut
       sebagai pill kecil di tengah-atas area chart (di atas titik potong
       BEP, area yg kosong). Karena keluar dari alur normal (position:
       absolute), .bep-chart-svg (flex:1) tetap memakai SELURUH tinggi
       chart-wrap -> grafik tetap tinggi. Semua discope #desktopBepChart ->
       legenda kartu HP (#dashboardBEPSummary) TIDAK berubah. */
    #desktopBepChart .bep-chart-legend {
      display: flex;
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      gap: 14px;
      z-index: 2;
      padding: 3px 11px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 1px 2px rgba(17,24,39,0.05);
    }
    /* Master Biaya desktop: SEMUA komponen (Gas/Chemical/Listrik/Packing/
       Air/Nota) harus tampil. Sebelumnya .mb-komponen-list pakai
       justify-content:space-between (dari aturan dasar di atas) + flex:1 -
       itu menyebar 4 item teratas dgn jarak lebar & mendorong 2 item
       terbawah ke area panel yg ke-clip (overflow:hidden), jadi Air/Nota
       terpotong. Diganti flex-start supaya semua baris dipadatkan dari
       ATAS dgn jarak konsisten - ruang yg tadinya terbuang jadi gap lebar
       kini menampung baris 5 & 6 di area yg sama. justify-content di-reset
       eksplisit (bukan cuma gap) supaya menang atas aturan dasar. */
    /* Judul "Master Biaya Produksi" dikecilkan & garis/jaraknya dinaikkan
       (font 14->11px, jarak bawah 8->2px) supaya blok data di bawahnya
       ikut naik & baris terakhir (Nota) muat. Judul ini SIBLING dari
       #desktopMasterBiaya (bukan anak), jadi discope pakai
       :has(#desktopMasterBiaya) -> judul panel BEP & Harga Layanan TIDAK

    .desktop-summary-panel:has(#desktopMasterBiaya) .desktop-panel-title { font-size: 11px; margin-bottom: 0; }
    #desktopMasterBiaya .mb-komponen-list { justify-content: flex-start; gap: 1px; }
    #desktopMasterBiaya .mb-komponen-row-desktop { gap: 2px; }
    /* Tinggi panel (dikunci fit-JS) hanya cukup utk ~4 baris pada ukuran
       lama, jadi Air & Nota jatuh di area yg ke-clip. Tiap baris dipadatkan
       (font 12px + line-height rapat, bar 5px) supaya 6 komponen muat dalam

       (#dashboardMasterBiayaSummary) & panel lain tidak tersentuh. */
    #desktopMasterBiaya .mb-komponen-line1 .mb-komponen-label { font-size: 12px; line-height: 1.2; }

    /* Judul "Harga Layanan" disamakan dgn panel BEP/Master Biaya (font

       #desktopHargaLayanan -> discope :has(#desktopHargaLayanan). */
    .desktop-summary-panel:has(#desktopHargaLayanan) .desktop-panel-title { font-size: 11px; margin-bottom: 0; }
    #desktopHargaLayanan .hl-item { padding: 10px 12px; }

    /* Nama layanan dikecilkan + nowrap -> "Cuci Kering Setrika"/"Setrika

    #desktopHargaLayanan .hl-name { font-size: 11px; line-height: 1.25; white-space: nowrap; }

    /* Badge margin ("Margin Sehat"/"Sangat Sehat") fontnya dikecilkan. */

    /* Label "HARGA JUAL / HPP PER LOAD / MIN ORDER" dikecilkan + nowrap +
       tracking dirapatkan -> "HPP PER LOAD" muat 1 baris, tidak bertumpuk. */
    #desktopHargaLayanan .hl-stat-label { font-size: 8px; letter-spacing: 0.02em; white-space: nowrap; }
  }
