<!--
===============================================================================
FILE: Style_Module_Dashboard.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Style khusus layar Dashboard/Menu Utama (screenMenu)

FUNGSI:
Semua style kartu ringkasan Dashboard: menu-grid, dashboard-header, outlet
filter pill, profil-outlet-card (kartu Cabang), bep-card, mb-* (kartu Master
Biaya), dashboard-kpi/outlet-list (kartu Cabang detail), footer-bar, hl-*
(kartu Harga Layanan versi ringkas di dashboard), fc-* (kartu Fixed Cost versi
ringkas di dashboard), plus perbaikan overflow mobile khusus dashboard.

CATATAN PENTING:
hl-* dan fc-* di sini BUKAN duplikat Style_Module_HargaLayanan.html /
Style_Module_FixedCost.html -- itu style untuk LAYAR DETAIL PENUH,
sedangkan file ini untuk KARTU RINGKAS di Dashboard (render-nya di
Script_Fitur_Dashboard.html, fungsi renderDashboardHargaLayananCard /
renderDashboardFixedCostCard). Class name sengaja sama karena konteksnya
terkait, tapi elemen DOM & scope-nya beda (dashboard card vs layar detail).

Dipisah dari Style_Components.html 2026-07-09 karena komentar header file
itu sendiri sudah lama menyatakan TIDAK BOLEH berisi style khusus
Master Biaya/HPP/FixedCost/HargaLayanan, tapi isinya sudah kemasukan itu semua.
===============================================================================
-->
