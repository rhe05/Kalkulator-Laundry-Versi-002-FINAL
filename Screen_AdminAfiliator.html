<!--
===============================================================================
FILE: Screen_AdminAfiliator.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Layar Admin - Buat & Kirim Akun Afiliator (KHUSUS admin)

FUNGSI:
Form 2 field (email + nama afiliator) - klik "Buat & Kirim Akun" -> backend
adminCreateAffiliateAccount (Modul_Auth.gs) bikin akun trial 7 hari & kirim
email berisi email+password ke afiliator. Layar ini SECARA UI cuma
dimunculkan untuk email admin (lihat authApplyAdminUI_ di Script_Fitur_Auth.html)
- keamanan SESUNGGUHNYA ditegakkan di backend (cek session.email di
adminCreateAffiliateAccount), bukan cuma sembunyi-sembunyi di client.

Di-include dari Index.html lewat include('Screen_AdminAfiliator'). Jangan
tambah tag <script> atau <style> di file ini -- itu tugas file Style_*/Script_*.
===============================================================================
-->
    <section class="screen" id="screenAdminAfiliator">
      <div class="list-header">
        <h1>Buat Akun Afiliator</h1>
      </div>

      <section class="panel">
        <div class="panel-body">
          <div class="field">
            <label for="adminAfiliatorEmail">Email Afiliator (Gmail)</label>
            <input type="email" id="adminAfiliatorEmail" placeholder="nama@gmail.com" autocomplete="off">
          </div>
          <div class="field">
            <label for="adminAfiliatorNama">Nama Afiliator</label>
            <input type="text" id="adminAfiliatorNama" placeholder="Contoh: Budi" autocomplete="off">
          </div>

          <div class="auth-error" id="adminAfiliatorError" style="display:none;"></div>
          <div id="adminAfiliatorResult" style="display:none; background: var(--panel-2); border-left: 3px solid var(--sage); padding: 10px 12px; border-radius: 4px; font-size: 13px; color: var(--text); line-height: 1.5; margin-top: 10px;"></div>

          <button class="btn-primary" id="adminAfiliatorBtn" onclick="submitAdminAfiliator()" style="width:100%; margin-top:10px;">Buat &amp; Kirim Akun</button>
          <p style="font-size: 12px; color: var(--text-faint); line-height: 1.5; margin-top: 10px;">Akun aktif otomatis, akses trial 7 hari. Email berisi email + password terkirim otomatis ke afiliator.</p>
        </div>
      </section>
    </section>
