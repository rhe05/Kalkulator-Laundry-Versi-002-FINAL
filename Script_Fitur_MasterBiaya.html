<!--
===============================================================================
FILE: Script_Fitur_MasterBiaya.html
PROJECT: Kalkulator Laundry Versi 002
ISI: Menu Master Biaya

FUNGSI:
Pilih cabang untuk kategori biaya, gerbang ke Gas/Chemical/Packing/Listrik/Air/NotaKasir.

PENTING -- catat sebelum edit:
Semua file Script_*.html berbagi SATU scope global yang sama (Apps Script
include() cuma menggabungkan teks mentah jadi satu <script> demi <script>
di halaman yang sama -- bukan module system). Karena itu file ini SENGAJA
TIDAK dibungkus (function(){...})() -- kalau kamu bungkus lagi, fungsi di
file ini jadi tidak kelihatan dari file lain dan app akan rusak.
Urutan include TIDAK masalah untuk deklarasi function/var (hoisting),
TAPI Script_Boot_Main.html WAJIB tetap paling terakhir karena dia yang
menjalankan bootApp().
===============================================================================
-->
<script>
"use strict";
  function refreshBiayaPickCabangList() {
    var listEl = document.getElementById("biayaPickCabangList");
    var emptyEl = document.getElementById("biayaPickCabangEmpty");
    listEl.innerHTML = "<div class=\"empty-hint\">Memuat daftar cabang...</div>";
    emptyEl.style.display = "none";

    // SWR: daftar cabang (listCabang, cache bersama) tampil INSTAN lalu
    // refresh. Cache dibuang saat outlet ditambah/diubah/dihapus.
    cachedServerRead_("listCabang", undefined, function (res, fromCache) {
      if (view.screen !== "masterBiaya") return;
      if (!res || !res.ok) {
        if (!fromCache) { handleBackendError(res, "memuat daftar cabang"); listEl.innerHTML = ""; }
        return;
      }
      cabangListCache = res.data;
      renderBiayaPickCabangList();
      renderMasterBiayaDesktop_();
    }, function (err, hadCache) {
      if (hadCache) return;
      handleBackendError({ error: err && err.message ? err.message : String(err), stage: "client:listCabang(masterBiaya)" }, "memuat daftar cabang");
      listEl.innerHTML = "";
    });
  }

  function renderBiayaPickCabangList() {
    var listEl = document.getElementById("biayaPickCabangList");
    var emptyEl = document.getElementById("biayaPickCabangEmpty");
    listEl.innerHTML = "";

    if (cabangListCache.length === 0) {
      emptyEl.style.display = "block";
      return;
    }
    emptyEl.style.display = "none";

    cabangListCache.forEach(function (item) {
      var row = document.createElement("div");

      // Outlet Jasa Setrika yang cuma pakai Setrika Uap tidak punya komponen
      // listrik apa pun untuk dihitung (tidak ada mesin cuci/pengering, dan
      // setrika uap tidak berbiaya listrik) - tombol Listrik dinonaktifkan
      // KHUSUS untuk kombinasi ini. Kategori/mesin lain tidak terpengaruh.
      var setrikaRows = Array.isArray(item.mesinSetrika) ? item.mesinSetrika : [];
      var adaSetrikaListrik = setrikaRows.some(function (m) { return m.jenis === "listrik"; });
      var disableForListrik = view.kategoriBiayaAktif === "listrik" &&
        isSetrikaOnlyKategori(item.kategoriLayanan) && !adaSetrikaListrik;

      row.className = "pick-cabang-row" + (disableForListrik ? " disabled" : "");
      row.onclick = function () {
        if (disableForListrik) {
          showToast("Outlet ini kategori Jasa Setrika dengan Setrika Uap - tidak ada komponen listrik untuk dihitung.", "");
          return;
        }
        if (view.kategoriBiayaAktif === "listrik") { openListrikForm(item.id); }
        else if (view.kategoriBiayaAktif === "air") { openAirForm(item.id); }
        else if (view.kategoriBiayaAktif === "notaKasir") { openNotaKasirForm(item.id); }
        else if (view.kategoriBiayaAktif === "chemical") { openChemicalList(item.id); }
        else if (view.kategoriBiayaAktif === "packing") { openPackingList(item.id); }
        else { openGasList(item.id); }
      };
      row.innerHTML =
        "<span class=\"name\">" + escapeHtml(item.namaLaundry || "(Tanpa nama)") + "</span>" +
        "<span class=\"arrow\">&#8594;</span>";
      listEl.appendChild(row);
    });
  }

  /**
   * openGasList: masuk ke daftar kartu "Analisa Biaya Gas" untuk satu cabang.
   * Memanggil listBiayaGas(cabangId) yang mengembalikan SEKALIGUS profil
   * cabang ringkas (untuk judul + dropdown dryer) dan seluruh record gas
   * dengan summary masing-masing ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â jadi cukup satu roundtrip.
   */

  /**
   * =========================================================================
   * MASTER BIAYA - LAYAR DESKTOP (#screenMasterBiaya, >=1100px)
   * -------------------------------------------------------------------------
   * Satu kartu berisi ringkasan 6 komponen biaya (Gas/Listrik/Air/Chemical/
   * Packing/Nota) utk outlet yang sedang dipilih (dashboardSelectedOutletId,
   * dipakai bareng Dashboard & Profil Outlet), tiap komponen punya tombol
   * kelola (CRUD) yang membuka layar kategori itu langsung utk outlet ini -
   * pola sama dgn tombol Edit di layar Profil Outlet. Data diambil dari
   * getDashboardMasterBiayaSummary(cabangId) (Modul_Dashboard.gs, SUDAH ada,
   * dipakai bareng kartu ringkas Dashboard) lewat cachedServerRead_ (SWR).
   * HP tidak pernah memuat elemen ini (guard host di bawah).
   * =========================================================================
   */
  var MASTERBIAYA_KATEGORI_META = [
    { key: "gas", label: "Gas LPG", tone: "flame", open: "openGasList" },
    { key: "listrik", label: "Listrik", tone: "volt", open: "openListrikForm" },
    { key: "air", label: "Air", tone: "sage", open: "openAirForm" },
    { key: "chemical", label: "Chemical", tone: "indigo", open: "openChemicalList" },
    { key: "packing", label: "Packing", tone: "clay", open: "openPackingList" },
    { key: "nota", label: "Nota / Kasir", tone: "brass", open: "openNotaKasirForm" }
  ];

  function renderMasterBiayaDesktop_() {
    var host = document.getElementById("masterBiayaDesktopGrid");
    if (!host) return;

    var rows = cabangListCache || [];
    if (typeof ensureDashboardOutletSelection_ === "function") ensureDashboardOutletSelection_();
    if (typeof updateOutletFilterPillText_ === "function") updateOutletFilterPillText_();

    var selId = (typeof dashboardSelectedOutletId !== "undefined") ? dashboardSelectedOutletId : null;
    var current = rows.find(function (c) { return c.id === selId; }) || rows[0] || null;

    if (!current) {
      host.innerHTML = '<div class="dashboard-empty">Belum ada outlet. Tambahkan outlet dulu di menu Profil Outlet.</div>';
      if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
      return;
    }

    host.innerHTML = '<div class="dashboard-card-summary is-loading">Memuat data...</div>';
    var cId = current.id;

    // SWR: kartu tampil dari cache dulu (kalau ada) lalu direfresh - dipicu
    // bareng data terbaru dari server, cache dibuang tiap ada simpan di
    // salah satu kategori (lihat invalidateServerReadCache_ di masing-masing
    // fitur Biaya*).
    cachedServerRead_("getDashboardMasterBiayaSummary", cId, function (res, fromCache) {
      // Kalau outlet sudah berpindah / layar sudah pindah sebelum respons
      // datang, jangan timpa tampilan yang sedang aktif.
      if (view.screen !== "masterBiaya") return;
      var stillSelected = ((typeof dashboardSelectedOutletId !== "undefined") ? dashboardSelectedOutletId : null) === cId;
      if (!stillSelected) return;

      if (!res || !res.ok) {
        if (!fromCache) host.innerHTML = '<div class="dashboard-empty">' + escapeHtml(res && res.error ? res.error : "Data master biaya belum bisa dibaca.") + '</div>';
        if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
        return;
      }
      var data = res.data || {};
      var row = Array.isArray(data.rows) && data.rows.length ? data.rows[0] : null;
      host.innerHTML = buildMasterBiayaDesktopHtml_(cId, row);
      // Konten baru bisa mengubah tinggi kartu - kunci ulang 1 layar (lihat
      // fitDesktopDashboardToViewport_ di Script_Fitur_Dashboard.html).
      if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
    }, function (err, hadCache) {
      if (hadCache) return;
      host.innerHTML = '<div class="dashboard-empty">' + escapeHtml(err && err.message ? err.message : String(err)) + '</div>';
      if (typeof window.fitDesktopDashboardToViewport_ === "function") requestAnimationFrame(window.fitDesktopDashboardToViewport_);
    });
  }

  /**
   * buildMasterBiayaDesktopHtml_: kartu komponen dibangun dengan menggunakan
   * ULANG class ".gas-card"/".gas-result-cell" apa adanya (persis komponen
   * "Analisa Biaya Gas" yang sudah jadi acuan visual premium di aplikasi ini
   * - lihat juga Chemical & Packing yang sudah lebih dulu reuse pola yang
   * sama, dicatat di KONTEKS_PROYEK.md). Prinsipnya: JANGAN bikin bahasa
   * visual baru untuk "ringkasan fitur" - satu komponen kartu premium yang
   * sudah disetujui dipakai konsisten di semua tempat.
   */
  // Baris "Item tercatat" (Chemical) bisa panjang - kartu ini padat (6
  // kartu 1 layar), jadi teks detail dipotong supaya tidak mendorong tinggi
  // kartu. Daftar lengkapnya tetap ada di layar Chemical sendiri (Kelola).
  function truncateDetailText_(text, maxLen) {
    if (!text || text.length <= maxLen) return text;
    return text.slice(0, maxLen - 1) + '…';
  }

  function buildMasterBiayaDetailRowsHtml_(detail) {
    if (!Array.isArray(detail) || !detail.length) return '';
    return detail.map(function (d) {
      var valText = (d.amount !== undefined && d.amount !== null) ? money0(d.amount) : truncateDetailText_(d.text || '-', 34);
      return '<div class="meta-row"><span class="meta-label">' + escapeHtml(d.label) + '</span><span class="meta-val">' + escapeHtml(valText) + '</span></div>';
    }).join('');
  }

  /**
   * buildGasCardBodyHtml_: kartu Gas di Master Biaya desktop dirender PERSIS
   * spt kartu "Analisa Biaya Gas" per record (screenshot acuan user,
   * 2026-07-12) - Harga per tabung, Estimasi pemakaian, Konversi waktu,
   * Estimasi load, Biaya Gas Dryer Per Load, Biaya Gas Setrika Per Jam.
   * Sumber: field gasCard dari getDashboardMasterBiayaSummary (Modul_
   * Dashboard.gs) - config 4 field pertama dari tabung PERTAMA outlet ini,
   * 2 nominal Rp terakhir dari TOTAL semua tabung (sama persis angka yang
   * dipakai utk kontribusi %, bukan hitungan baru).
   */
  function buildGasCardBodyHtml_(gasCard) {
    var metaRowsHtml =
      '<div class="meta-row"><span class="meta-label">Harga per tabung</span><span class="meta-val">' + money0(gasCard.hargaPerTabung) + '</span></div>' +
      '<div class="meta-row"><span class="meta-label">Estimasi pemakaian</span><span class="meta-val">' + escapeHtml(formatNum(gasCard.estimasiPemakaianJam)) + ' jam</span></div>' +
      '<div class="meta-row"><span class="meta-label">Biaya per jam</span><span class="meta-val">' + money0(gasCard.biayaPerJam) + '</span></div>' +
      '<div class="meta-row"><span class="meta-label">Biaya per menit</span><span class="meta-val">' + money0(gasCard.biayaPerMenit) + '</span></div>' +
      (gasCard.hasDryerRef ? '<div class="meta-row"><span class="meta-label">Acuan Dryer</span><span class="meta-val">' + escapeHtml(formatNum(gasCard.dryerRefDurasiMenit)) + ' menit</span></div>' : '') +
      (gasCard.hasSetrikaRef ? '<div class="meta-row"><span class="meta-label">Acuan Setrika Uap</span><span class="meta-val">' + escapeHtml(formatNum(gasCard.setrikaKapasitasKgPerJam)) + ' kg/jam</span></div>' : '');

    var gridCellsHtml =
      '<div class="gas-result-cell"><div class="label">Konversi waktu</div><div class="val">' + escapeHtml(formatNum(gasCard.konversiMenit)) + '<span class="unit">menit</span></div></div>' +
      (gasCard.hasDryerRef ? '<div class="gas-result-cell"><div class="label">Estimasi load</div><div class="val">' + escapeHtml(formatNum(gasCard.estimasiLoadPemakaian)) + '<span class="unit">load</span></div></div>' : '');

    // Dua sel highlight DIJEJER 2 kolom (bukan ditumpuk 1 kolom penuh spt
    // kartu Gas asli) kalau keduanya ada - kartu ini di grid Master Biaya
    // desktop berbagi tinggi baris dgn 5 kartu lain (grid-auto-rows:1fr),
    // jadi harus lebih padat vertikal supaya tidak kepotong. Kalau cuma
    // satu yang ada, tetap 1 kolom penuh spt biasa. Persentase kontribusi
    // ke total biaya produksi ditampilkan sbg unit di bawah nominal.
    var highlightCellsHtml =
      (gasCard.hasDryerRef ? '<div class="gas-result-cell highlight"><div class="label">Biaya Gas Dryer Per Load</div><div class="val">' + money0(gasCard.biayaGasDryerPerLoad) + '<span class="unit">' + escapeHtml(String(Number(gasCard.persenDryerPerLoad || 0))) + '% dari total</span></div></div>' : '') +
      (gasCard.hasSetrikaRef ? '<div class="gas-result-cell highlight"><div class="label">Biaya Gas Setrika Per Jam</div><div class="val">' + money0(gasCard.biayaGasSetrikaPerJam) + '<span class="unit">' + escapeHtml(String(Number(gasCard.persenSetrikaPerJam || 0))) + '% dari total</span></div></div>' : '');
    var bothHighlights = gasCard.hasDryerRef && gasCard.hasSetrikaRef;
    var highlightHtml = highlightCellsHtml
      ? '<div class="gas-result-grid"' + (bothHighlights ? '' : ' style="grid-template-columns:1fr;"') + '>' + highlightCellsHtml + '</div>'
      : '';

    var moreNoteHtml = gasCard.moreCount > 0
      ? '<div class="mb-desktop-more-note">+' + gasCard.moreCount + ' tabung lain (total sudah termasuk di atas)</div>'
      : '';

    return (
      '<div class="meta-rows-scroll">' + metaRowsHtml + '</div>' +
      '<div class="gas-card-result">' +
        '<div class="gas-result-grid">' + gridCellsHtml + '</div>' +
        highlightHtml +
        moreNoteHtml +
      '</div>'
    );
  }

  function buildMasterBiayaDesktopHtml_(cabangId, row) {
    var komponen = row && Array.isArray(row.komponenBiaya) ? row.komponenBiaya : [];
    var byKey = {};
    komponen.forEach(function (k) { byKey[k.key] = k; });

    var cardsHtml = MASTERBIAYA_KATEGORI_META.map(function (meta) {
      var k = byKey[meta.key];
      var hasValue = !!k && Number(k.biayaPerLoad) > 0;
      var hasEntry = !!k;
      var unitLabel = (k && k.unitSuffix) ? k.unitSuffix.replace(/^\//, '') : 'load';
      var bodyHtml;

      if (meta.key === 'gas' && hasEntry && k.gasCard) {
        bodyHtml = buildGasCardBodyHtml_(k.gasCard);
      } else if (hasEntry) {
        var detailRowsHtml = buildMasterBiayaDetailRowsHtml_(k.detail);
        var resultHtml =
          '<div class="gas-result-grid" style="grid-template-columns:1fr;">' +
            '<div class="gas-result-cell highlight">' +
              '<div class="label">Biaya ' + escapeHtml(meta.label) + ' Per ' + escapeHtml(unitLabel.charAt(0).toUpperCase() + unitLabel.slice(1)) + '</div>' +
              '<div class="val">' + money0(k.biayaPerLoad) + '<span class="unit">' + escapeHtml(String(Number(k.persen || 0))) + '% dari total</span></div>' +
            '</div>' +
          '</div>';
        bodyHtml = '<div class="meta-rows-scroll">' + detailRowsHtml + '</div>' + '<div class="gas-card-result">' + resultHtml + '</div>';
      } else {
        bodyHtml =
          '<div class="gas-card-result">' +
            '<div class="gas-result-grid" style="grid-template-columns:1fr;">' +
              '<div class="gas-result-cell">' +
                '<div class="label">Status</div>' +
                '<div class="val mb-desktop-empty-val">Belum diisi</div>' +
              '</div>' +
            '</div>' +
          '</div>';
      }

      return (
        '<div class="gas-card mb-desktop-card tone-' + escapeHtml(meta.tone) + (hasValue ? '' : ' is-empty') + '">' +
          '<div class="gas-card-top">' +
            '<div class="title-group">' +
              '<span class="dot"></span>' +
              '<h3>' + escapeHtml(meta.label) + '</h3>' +
            '</div>' +
            '<div class="actions">' +
              '<button class="icon-btn" type="button" aria-label="' + (hasEntry ? 'Kelola' : 'Isi data') + ' ' + escapeHtml(meta.label) + '" onclick="' + meta.open + '(\'' + escapeJsAttr(cabangId) + '\')">' + (hasEntry ? '&#9998;' : '&#43;') + '</button>' +
            '</div>' +
          '</div>' +
          bodyHtml +
        '</div>'
      );
    }).join('');

    return '<div class="mb-desktop-grid">' + cardsHtml + '</div>';
  }
</script>
